<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Heatmap · Roadmap Builder</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%235E8A7B%22/><circle cx=%2228%22 cy=%2272%22 r=%2210%22 fill=%22white%22/><circle cx=%2252%22 cy=%2250%22 r=%2214%22 fill=%22white%22/><circle cx=%2278%22 cy=%2228%22 r=%228%22 fill=%22white%22/></svg>'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   TIDELAND DESIGN TOKENS
   ============================================================ */
:root {
  --base-bg:       #F7F4ED;
  --primary:       #5E8A7B;
  --primary-dark:  #2C4A52;
  --secondary:     #B5A491;
  --anchor:        #2C4A52;
  --highlight:     #C99B6B;
  --rag-red:       #9B4444;
  --text:          #1F2937;
  --text-muted:    #6B7280;
  --glass-bg-t:    rgba(255, 255, 252, 0.70);
  --glass-border-t:rgba(46, 74, 82, 0.10);
  --shadow-sm:     0 1px 3px rgba(44,74,82,0.08), 0 4px 12px rgba(44,74,82,0.06);
  --shadow-md:     0 2px 8px rgba(44,74,82,0.10), 0 8px 24px rgba(44,74,82,0.08);
  --shadow-lg:     0 4px 16px rgba(44,74,82,0.12), 0 16px 48px rgba(44,74,82,0.10);
  --radius-sm:     10px;
  --radius-md:     16px;
  --radius-lg:     20px;
  --radius-pill:   999px;
  --mono:          'Geist Mono', ui-monospace, monospace;
  --sans:          'Geist', -apple-system, sans-serif;
  --ease:          cubic-bezier(0.16, 1, 0.3, 1);
  --t-fast:        120ms;
  --t-base:        220ms;
  --t-slow:        380ms;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; font-size: 15px; }

body {
  font-family: var(--sans);
  background: var(--base-bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   SCHEMATIC BACKGROUND
   ============================================================ */
.schematic-bg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.12;
  filter: blur(0.5px) saturate(0.8);
}

/* ============================================================
   DEPTH ORBS
   ============================================================ */
.depth-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.depth-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(85px);
}
.depth-orb.o1 {
  width: 700px; height: 700px;
  top: -180px; left: -120px;
  background: radial-gradient(circle at 40% 40%, #5E8A7B 0%, transparent 70%);
  opacity: 0.22;
  animation: orbDrift1 100s ease-in-out infinite;
}
.depth-orb.o2 {
  width: 600px; height: 600px;
  bottom: -100px; right: -80px;
  background: radial-gradient(circle at 60% 60%, #B5A491 0%, transparent 70%);
  opacity: 0.20;
  animation: orbDrift2 120s ease-in-out infinite;
}
.depth-orb.o3 {
  width: 480px; height: 480px;
  top: 40%; left: 55%;
  background: radial-gradient(circle at 50% 50%, #C99B6B 0%, transparent 70%);
  opacity: 0.12;
  animation: orbDrift3 100s ease-in-out infinite;
}
@keyframes orbDrift1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(60px,-40px) scale(1.04); }
  66%      { transform: translate(-30px,50px) scale(0.97); }
}
@keyframes orbDrift2 {
  0%,100% { transform: translate(0,0) scale(1); }
  40%      { transform: translate(-50px,30px) scale(1.05); }
  70%      { transform: translate(40px,-20px) scale(0.96); }
}
@keyframes orbDrift3 {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  50%      { transform: translate(-52%,-48%) scale(1.06); }
}

/* ============================================================
   PAGE WRAPPER
   ============================================================ */
.page {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  background: rgba(247, 244, 237, 0.88);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border-bottom: 1px solid var(--glass-border-t);
  margin: 0 -24px;
  padding-left: 24px;
  padding-right: 24px;
}
.topbar-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-meta {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  border: 1px solid var(--glass-border-t);
  background: var(--glass-bg-t);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text);
  text-decoration: none;
  transition: background var(--t-fast) var(--ease),
              border-color var(--t-fast) var(--ease),
              box-shadow var(--t-fast) var(--ease);
  white-space: nowrap;
}
.btn:hover {
  background: rgba(255,255,252,0.90);
  border-color: rgba(94,138,123,0.25);
  box-shadow: var(--shadow-sm);
}
.btn.primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--anchor) 100%);
  color: #fff;
  border-color: transparent;
}
.btn.primary:hover {
  background: linear-gradient(135deg, #6B9B8C 0%, #375863 100%);
  box-shadow: 0 4px 12px rgba(44,74,82,0.30);
}
.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.btn.ghost:hover {
  background: rgba(94,138,123,0.08);
  color: var(--text);
}
.btn .icn { display: inline-flex; align-items: center; }

/* ============================================================
   SECTION HEAD
   ============================================================ */
.section-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin: 32px 0 16px;
}
.section-num {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: 0.08em;
}
.section-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.section-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-left: auto;
}

/* ============================================================
   HEATMAP
   ============================================================ */
.heatmap-wrap {
  position: relative;
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  box-shadow: var(--shadow-md);
  padding: 32px 28px 24px;
}
.heatmap-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}
.heatmap-frame {
  display: grid;
  grid-template-columns: 124px 1fr;
  grid-template-rows: 1fr 56px;
  gap: 0;
  min-width: 760px;
  height: 600px;
}
.heatmap-axis-y {
  position: relative;
  border-right: 1px dashed rgba(46,74,82,0.18);
  padding-right: 10px;
}
.heatmap-axis-x {
  grid-column: 2;
  grid-row: 2;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border-top: 1px dashed rgba(46,74,82,0.18);
  padding-top: 10px;
}
.heatmap-axis-x .x-tick {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--mono);
  padding: 0 6px;
  line-height: 1.35;
}
.heatmap-axis-x .x-num {
  font-weight: 600;
  color: var(--anchor);
  font-size: 12px;
  display: block;
  margin-bottom: 2px;
}
.heatmap-grid {
  position: relative;
  grid-column: 2;
  grid-row: 1;
  height: 100%;
}
/* Bands behind grid */
.heatmap-band {
  position: absolute;
  left: 0; right: 0;
  pointer-events: none;
  z-index: 0;
}
.heatmap-band.deploy   { top: 0;          height: 33.333%; background: rgba(44,74,82,0.10); }
.heatmap-band.develop  { top: 33.333%;    height: 33.333%; background: rgba(94,138,123,0.10); }
.heatmap-band.research { top: 66.667%;    height: 33.333%; background: rgba(181,164,145,0.14); }

/* Band labels in Y axis area — placed at left edge, ticks at right */
.y-band {
  position: absolute;
  left: 0;
  width: 88px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  line-height: 1.3;
  white-space: nowrap;
  transform: translateY(-50%);
}
.y-band .y-band-name { display: block; }
.y-band .y-band-trls { color: var(--text-muted); font-size: 9.5px; margin-top: 2px; }
.y-band.deploy   { top: 16.67%; color: var(--anchor); }
.y-band.develop  { top: 50%;    color: var(--primary); }
.y-band.research { top: 83.33%; color: var(--secondary); }

/* TRL ticks 1..9 */
.y-tick {
  position: absolute;
  right: 4px;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-muted);
  transform: translateY(-50%);
  font-weight: 600;
}

/* Cell mesh — subtle grid */
.heatmap-mesh {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background-image:
    linear-gradient(to right,  rgba(46,74,82,0.07) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(46,74,82,0.07) 1px, transparent 1px);
  background-size: 20% 11.111%;
  background-position: 0 0;
}
.heatmap-mesh::after {
  /* outer border */
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid rgba(46,74,82,0.18);
  border-radius: 6px;
}

/* Dot */
.heatmap-dot {
  position: absolute;
  border-radius: 50%;
  border: 2px solid var(--anchor);
  box-shadow: 0 4px 12px rgba(44,74,82,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-family: var(--mono);
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  cursor: pointer;
  z-index: 5;
  user-select: none;
  transform: translate(-50%, -50%);
  transition: transform var(--t-fast) var(--ease),
              box-shadow var(--t-fast) var(--ease);
}
.heatmap-dot:hover,
.heatmap-dot.active {
  transform: translate(-50%, -50%) scale(1.06);
  box-shadow: 0 8px 24px rgba(44,74,82,0.40);
  z-index: 100;
}
.heatmap-dot.drag {
  transition: none;
  cursor: grabbing;
  box-shadow: 0 12px 28px rgba(44,74,82,0.45);
}
.heatmap-dot.rag-g { background: var(--primary); }
.heatmap-dot.rag-a { background: var(--highlight); }
.heatmap-dot.rag-r { background: var(--rag-red); }

.heatmap-dot-label {
  position: absolute;
  left: 50%;
  top: calc(100% + 6px);
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  text-shadow: 0 1px 0 rgba(247,244,237,0.85);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.heatmap-dot-owner {
  display: block;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 1px;
  font-family: var(--mono);
}

/* Tooltip */
.heatmap-tooltip {
  position: absolute;
  z-index: 200;
  min-width: 220px;
  max-width: 280px;
  padding: 12px 14px;
  background: rgba(255,255,252,0.96);
  border: 1px solid rgba(94,138,123,0.30);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -100%) translateY(-10px);
  transition: opacity var(--t-fast) var(--ease);
  font-size: 12px;
  line-height: 1.5;
}
.heatmap-tooltip.show { opacity: 1; }
.heatmap-tooltip .tt-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.heatmap-tooltip .tt-row  { color: var(--text-muted); }
.heatmap-tooltip .tt-row strong { color: var(--text); font-weight: 600; }
.heatmap-tooltip .tt-rag {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: 1px;
}
.heatmap-tooltip .tt-rag.g { background: var(--primary); }
.heatmap-tooltip .tt-rag.a { background: var(--highlight); }
.heatmap-tooltip .tt-rag.r { background: var(--rag-red); }
.heatmap-tooltip .tt-hint {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--primary);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Legend */
.heatmap-legend {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px 22px;
  margin-top: 22px;
  padding: 16px 18px;
  background: rgba(247,244,237,0.55);
  border: 1px solid var(--glass-border-t);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--text-muted);
}
.heatmap-legend h4 {
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--anchor);
  font-family: var(--mono);
  margin-bottom: 7px;
}
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--anchor);
  flex-shrink: 0;
}
.legend-swatch.g { background: var(--primary); }
.legend-swatch.a { background: var(--highlight); }
.legend-swatch.r { background: var(--rag-red); }
.legend-band {
  width: 24px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}
.legend-band.deploy   { background: rgba(44,74,82,0.30); }
.legend-band.develop  { background: rgba(94,138,123,0.30); }
.legend-band.research { background: rgba(181,164,145,0.45); }
.legend-size-demo {
  display: flex; align-items: center; gap: 4px;
}
.legend-size-demo .dot-sm,
.legend-size-demo .dot-md,
.legend-size-demo .dot-lg {
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.legend-size-demo .dot-sm { width: 8px;  height: 8px; }
.legend-size-demo .dot-md { width: 13px; height: 13px; }
.legend-size-demo .dot-lg { width: 18px; height: 18px; }

/* Bench (not yet assessed) */
.heatmap-bench {
  margin-top: 24px;
  padding: 16px 18px;
  background: rgba(181,164,145,0.10);
  border: 1px dashed rgba(46,74,82,0.20);
  border-radius: var(--radius-md);
}
.bench-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.bench-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.bench-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 6px 8px;
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  border-radius: var(--radius-pill);
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.bench-chip:hover { background: rgba(255,255,252,0.95); border-color: rgba(94,138,123,0.35); }
.bench-chip-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--anchor);
}
.bench-chip-dot.g { background: var(--primary); }
.bench-chip-dot.a { background: var(--highlight); }
.bench-chip-dot.r { background: var(--rag-red); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  box-shadow: var(--shadow-md);
}
.empty-state h2 { font-size: 22px; color: var(--text); margin-bottom: 10px; }
.empty-state p  { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

/* Footer */
.foot {
  margin-top: 64px;
  padding: 20px 24px;
  border-radius: var(--radius-md);
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
}

/* Toast */
.toast-container {
  position: fixed; bottom: 28px; right: 28px; z-index: 9999;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
.toast {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 13px 16px; border-radius: 14px;
  min-width: 240px; max-width: 380px;
  background: rgba(31,41,55,0.94);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 8px 32px rgba(0,0,0,0.32);
  color: #fff; font-size: 13.5px; pointer-events: auto;
  position: relative; overflow: hidden;
  animation: toastIn var(--t-base) var(--ease) forwards;
}
.toast.out { animation: toastOut var(--t-base) var(--ease) forwards; }
@keyframes toastIn  { from { opacity:0; transform:translateY(12px) scale(0.96); } to { opacity:1; transform:none; } }
@keyframes toastOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(8px) scale(0.97); } }
.toast-icon { flex-shrink:0; opacity:0.85; }
.toast-msg  { flex:1; line-height:1.45; color:#fff; }

/* Rise animation */
.rise { opacity:0; transform:translateY(14px); animation:rise var(--t-slow) var(--ease) forwards; }
.d1 { animation-delay: 60ms; }
.d2 { animation-delay:120ms; }
@keyframes rise { to { opacity:1; transform:none; } }

/* Not found */
.notfound { text-align: center; padding: 80px 24px; color: var(--text-muted); }
.notfound h2 { font-size: 22px; color: var(--text); margin-bottom: 12px; }
.notfound a  { color: var(--primary); text-decoration: none; font-weight: 500; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .page { padding: 0 16px 48px; }
  .topbar { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
  .topbar-meta { display: none; }
  .heatmap-frame { min-width: 640px; }
  .topbar-actions .btn span:not(.icn) { display: none; }
}

/* ---- POLISH C3 ---- */
/* Slim sage scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(94,138,123,0.38); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(94,138,123,0.58); }
* { scrollbar-width: thin; scrollbar-color: rgba(94,138,123,0.38) transparent; }

/* Topbar button height */
.topbar .btn, .topbar button.btn, .topbar a.btn { min-height: 36px; }

@media (max-width: 768px) {
  .topbar { flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
  .topbar-actions { flex-wrap: wrap; gap: 6px; }
  .heatmap-wrap { overflow-x: auto; min-width: 0; }
  .heatmap-inner { min-width: 640px; }
  .page { padding: 16px 10px 40px; }
}

/* ---- SECURITY FOOTER NOTICE ---- */
.sec-footer-notice {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--secondary, #B5A491);
  margin-top: 8px;
  padding-top: 8px;

        'background:rgba(255,255,252,0.70);backdrop-filter:blur(8px);' +
        'font-size:12px;font-weight:700;color:#6B7280;cursor:pointer;' +
        'font-family:ui-monospace,monospace;transition:all 120ms ease;flex-shrink:0;line-height:1;}' +
      '#tour-retrigger-btn:hover{background:rgba(94,138,123,0.12);color:#5E8A7B;' +
        'border-color:rgba(94,138,123,0.30);}';
    document.head.appendChild(s);
  }

  // ── Overlay DOM ───────────────────────────────────────────────────────
  function buildOverlay() {
    if (document.getElementById('tour-overlay')) return;
    var ov = document.createElement('div');
    ov.id = 'tour-overlay';
    ov.innerHTML =
      '<div id="tour-spotlight"></div>' +
      '<div id="tour-tooltip">' +
        '<div class="tour-step-row">' +
          '<span class="tour-step-badge" id="tour-step-badge">1 of ' + TOTAL + '</span>' +
          '<button class="tour-x-btn" id="tour-x" title="Skip tour">×</button>' +
        '</div>' +
        '<div class="tour-edge-msg" id="tour-edge-msg" style="display:none"></div>' +
        '<div class="tour-text" id="tour-text"></div>' +
        '<div class="tour-actions">' +
          '<button class="tour-btn t-ghost" id="tour-back">← Back</button>' +
          '<span class="tour-spacer"></span>' +
          '<button class="tour-btn t-ghost" id="tour-skip">Skip tour</button>' +
          '<button class="tour-btn t-primary" id="tour-next">Next →</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);
  }

  // ── Spotlight + tooltip positioning ──────────────────────────────────
  function positionSpotlight(el) {
    var spot = document.getElementById('tour-spotlight');
    var tip  = document.getElementById('tour-tooltip');
    if (!spot || !tip) return;
    if (!el) {
      spot.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;' +
        'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);border-radius:10px;';
      tip.style.top = ''; tip.style.bottom = '32px';
      tip.style.left = '50%';
      tip.style.transform = 'translateX(-50%)';
      return;
    }
    tip.style.transform = '';
    var pad = 8;
    var r   = el.getBoundingClientRect();
    spot.style.cssText =
      'position:fixed;' +
      'top:'    + (r.top    - pad) + 'px;' +
      'left:'   + (r.left   - pad) + 'px;' +
      'width:'  + (r.width  + pad * 2) + 'px;' +
      'height:' + (r.height + pad * 2) + 'px;' +
      'border-radius:10px;' +
      'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);' +
      'outline:2px solid rgba(255,255,255,0.55);';
    // Fixed bottom centre — spotlight tracks element, tooltip stays put
    tip.style.top = ''; tip.style.bottom = '32px';
    tip.style.left = '50%';
    tip.style.transform = 'translateX(-50%)';
  }

  // ── Step rendering ────────────────────────────────────────────────────
  var activeStep = currentStep;

  function renderStep(step) {
    activeStep = step;
    var badge   = document.getElementById('tour-step-badge');
    var textEl  = document.getElementById('tour-text');
    var edgeEl  = document.getElementById('tour-edge-msg');
    var backBtn = document.getElementById('tour-back');
    var nextBtn = document.getElementById('tour-next');
    if (badge)   badge.textContent  = step + ' of ' + TOTAL;
    if (textEl)  textEl.textContent = STEPS[step] || '';
    if (edgeEl)  edgeEl.style.display = 'none';
    if (backBtn) backBtn.disabled   = (step === 1);
    if (nextBtn) { nextBtn.textContent = (step === TOTAL) ? 'Finish ✓' : 'Next →'; nextBtn.disabled = false; }

    // Edge case: step 1 and no portfolio
    if (step === 1 && edgeEl) {
      if (!firstActivePortfolio()) {
        edgeEl.textContent = 'Create your portfolio first using the button below. The tour will continue automatically when you land on the dashboard.';
        edgeEl.style.display = 'block';
        if (nextBtn) nextBtn.disabled = true;
      }
    }
    var sel = STEP_TARGETS[step];
    var el  = sel ? document.querySelector(sel) : null;
    setTimeout(function() { positionSpotlight(el); }, 60);
  }

  // ── Navigation ────────────────────────────────────────────────────────
  function navTo(step) {
    var pf = firstActivePortfolio();
    var pr = pf ? firstProduct(pf) : null;

    // Same-page transitions (product.html steps 3 <-> 4)
    var onProductPage = (PAGE_STEPS.indexOf(3) !== -1 || PAGE_STEPS.indexOf(4) !== -1);
    if (onProductPage && (step === 3 || step === 4)) {
      setStep(step);
      var targetId = (step === 3) ? 's2' : 's7';
      var targetEl = document.getElementById(targetId);
      if (targetEl) {
        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(function() { renderStep(step); }, 350);
      } else {
        renderStep(step);
      }
      return;
    }

    setStep(step);
    switch (step) {
      case 1: window.location.href = 'index.html'; break;
      case 2: if (pf) { window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id); } break;
      case 3:
        if (pf && pr) {
          window.location.href = 'product.html?portfolio=' + encodeURIComponent(pf.id) + '&product=' + encodeURIComponent(pr.id);
        } else {
          // No products yet: skip to step 5
          setStep(5);
          if (pf) window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id);
        }
        break;
      case 5: if (pf) { window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id); } break;
      case 6: if (pf) { window.location.href = 'heatmap.html?id='   + encodeURIComponent(pf.id); } break;
      case 7: if (pf) { window.location.href = 'deck.html?id='      + encodeURIComponent(pf.id); } break;
    }
  }

  function doNext() {
    var step = activeStep;
    if (step === TOTAL) { markSeen(); var ov = document.getElementById('tour-overlay'); if (ov) ov.remove(); return; }
    if (step === 1 && !firstActivePortfolio()) return; // edge: no portfolio
    if (step === 3) { navTo(4); return; }
    if (step === 4) { navTo(5); return; }
    navTo(step + 1);
  }

  function doBack() {
    var step = activeStep;
    if (step <= 1) return;
    if (step === 4) { navTo(3); return; }
    navTo(step - 1);
  }

  function doSkip() {
    markSeen();
    var ov = document.getElementById('tour-overlay');
    if (ov) ov.remove();
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  function init() {
    wireRetrigger();
    injectStyles();
    buildOverlay();

    document.getElementById('tour-x').onclick    = doSkip;
    document.getElementById('tour-skip').onclick = doSkip;
    document.getElementById('tour-back').onclick = doBack;
    document.getElementById('tour-next').onclick = doNext;

    renderStep(currentStep);

    var _t;
    function onScrollResize() {
      clearTimeout(_t);
      _t = setTimeout(function() {
        var sel = STEP_TARGETS[activeStep];
        positionSpotlight(sel ? document.querySelector(sel) : null);
      }, 100);
    }
    window.addEventListener('resize',  onScrollResize);
    window.addEventListener('scroll',  onScrollResize, { passive: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

document.title = (portfolio.name || 'Portfolio') + ' · Heatmap';

  const products = portfolio.products || [];
  document.getElementById('foot-meta').textContent =
    `${products.length} product${products.length===1?'':'s'} · updated ${fmtDate(portfolio.updatedAt)}`;

  if (!products.length) {
    content.innerHTML = `
      <div class="section-head rise d1">
        <span class="section-num">01</span>
        <span class="section-title">TRL × Commercialization Heatmap</span>
      </div>
      <div class="empty-state rise d2">
        <h2>No products to plot yet</h2>
        <p>Add products from the dashboard to see them positioned on the heatmap.</p>
        <a href="dashboard.html?id=${esc(portfolioId)}" class="btn primary">← Back to dashboard</a>
      </div>
    `;
  } else {
    renderHeatmap(products);
  }
}

/* ============================================================
   RENDER HEATMAP
   ============================================================ */
function renderHeatmap(products) {
  const plotted = [];
  const bench = [];
  products.forEach(p => {
    const trl   = (p.technologyReadiness || {}).trl;
    const stage = p.commercializationStage;
    if (trl == null || stage == null) bench.push(p);
    else plotted.push(p);
  });

  // FTE range for sizing
  const ftes = plotted.map(p => (p.investment||{}).fteCount).filter(n => typeof n === 'number');
  const maxFte = ftes.length ? Math.max(...ftes, 1) : 1;
  const minFte = ftes.length ? Math.min(...ftes, 0) : 0;

  function dotSize(fte) {
    if (typeof fte !== 'number') return 55;
    if (maxFte === minFte) return 55;
    const t = (fte - minFte) / (maxFte - minFte);
    return Math.round(40 + t * 40);
  }
  function initials(name) {
    return (name || '').replace(/[^A-Za-z]/g, '').slice(0, 2).toUpperCase() || '··';
  }

  // Build dots HTML
  const dotsHTML = plotted.map(p => {
    const trl   = p.technologyReadiness.trl;
    const stage = p.commercializationStage;
    const fte   = (p.investment||{}).fteCount;
    const rag   = (p.rag||{}).status || 'A';
    const size  = dotSize(fte);
    const leftPct = ((stage - 0.5) / 5) * 100;
    const topPct  = ((9.5 - trl) / 9) * 100;
    return `
      <div class="heatmap-dot rag-${rag.toLowerCase()}"
           data-product-id="${esc(p.id)}"
           data-trl="${trl}"
           data-stage="${stage}"
           data-fte="${fte == null ? '' : fte}"
           data-rag="${esc(rag)}"
           style="left:${leftPct}%; top:${topPct}%; width:${size}px; height:${size}px; font-size:${Math.round(size*0.3)}px;">
        ${esc(initials(p.identity && p.identity.name))}
        <span class="heatmap-dot-label">
          ${esc((p.identity && p.identity.name) || 'Untitled')}
          ${p.identity && p.identity.owner ? `<span class="heatmap-dot-owner">${esc(p.identity.owner)}</span>` : ''}
        </span>
      </div>
    `;
  }).join('');

  const benchHTML = bench.length ? `
    <div class="heatmap-bench rise d2">
      <div class="bench-label">Not yet assessed · ${bench.length} product${bench.length===1?'':'s'}</div>
      <div class="bench-list">
        ${bench.map(p => {
          const rag = (p.rag||{}).status || 'A';
          return `
            <span class="bench-chip" data-product-id="${esc(p.id)}">
              <span class="bench-chip-dot ${rag.toLowerCase()}"></span>
              ${esc((p.identity && p.identity.name) || 'Untitled')}
            </span>
          `;
        }).join('')}
      </div>
    </div>
  ` : '';

  content.innerHTML = `
    <div class="section-head rise d1">
      <span class="section-num">01</span>
      <span class="section-title">TRL × Commercialization Heatmap</span>
      <span class="section-sub">${plotted.length} plotted${bench.length ? ' · ' + bench.length + ' unassessed' : ''}</span>
    </div>

    <div class="heatmap-wrap rise d2">
      <div class="heatmap-scroll">
        <div class="heatmap-frame">
          <div class="heatmap-axis-y">
            <div class="y-band deploy">
              <span class="y-band-name">Deployment</span>
              <span class="y-band-trls">TRL 7 · 8 · 9</span>
            </div>
            <div class="y-band develop">
              <span class="y-band-name">Development</span>
              <span class="y-band-trls">TRL 4 · 5 · 6</span>
            </div>
            <div class="y-band research">
              <span class="y-band-name">Research</span>
              <span class="y-band-trls">TRL 1 · 2 · 3</span>
            </div>
            ${[9,8,7,6,5,4,3,2,1].map((n, i) => {
              const pct = ((i + 0.5) / 9) * 100;
              return `<div class="y-tick" style="top:${pct}%;">${n}</div>`;
            }).join('')}
          </div>
          <div class="heatmap-grid" id="heatmap-grid">
            <div class="heatmap-band deploy"></div>
            <div class="heatmap-band develop"></div>
            <div class="heatmap-band research"></div>
            <div class="heatmap-mesh"></div>
            ${dotsHTML}
            <div class="heatmap-tooltip" id="heatmap-tooltip"></div>
          </div>
          <div class="heatmap-axis-x">
            ${[1,2,3,4,5].map(n => `
              <div class="x-tick">
                <span class="x-num">0${n}</span>
                ${STAGE_NAMES[n]}
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="heatmap-legend">
        <div>
          <h4>RAG status</h4>
          <div class="legend-row"><span class="legend-swatch g"></span> On track</div>
          <div class="legend-row"><span class="legend-swatch a"></span> Watch</div>
          <div class="legend-row"><span class="legend-swatch r"></span> At risk</div>
        </div>
        <div>
          <h4>TRL bands</h4>
          <div class="legend-row"><span class="legend-band deploy"></span> Deployment (7–9)</div>
          <div class="legend-row"><span class="legend-band develop"></span> Development (4–6)</div>
          <div class="legend-row"><span class="legend-band research"></span> Research (1–3)</div>
        </div>
        <div>
          <h4>Dot size</h4>
          <div class="legend-row">
            <span class="legend-size-demo">
              <span class="dot-sm"></span><span class="dot-md"></span><span class="dot-lg"></span>
            </span>
            Investment (FTE count)
          </div>
          <div class="legend-row" style="font-size:11px; margin-top:6px;">Click a dot to open the product. Drag to rearrange for presentation (not saved).</div>
        </div>
      </div>
    </div>

    ${benchHTML}
  `;

  wireDots();
  wireBench();
}

/* ============================================================
   DOT INTERACTIONS
   ============================================================ */
function wireDots() {
  const tooltip = document.getElementById('heatmap-tooltip');
  const grid    = document.getElementById('heatmap-grid');
  if (!tooltip || !grid) return;

  const dots = grid.querySelectorAll('.heatmap-dot');

  function showTooltip(dot) {
    const id = dot.dataset.productId;
    const p = (portfolio.products || []).find(x => x.id === id);
    if (!p) return;
    const trl = Number(dot.dataset.trl);
    const stage = Number(dot.dataset.stage);
    const fte = dot.dataset.fte === '' ? '—' : dot.dataset.fte;
    const rag = (dot.dataset.rag || 'A').toLowerCase();
    const next = (p.nextMilestone || {}).description || '—';
    const nextDate = (p.nextMilestone || {}).targetDate;
    const nextStr = nextDate ? `${esc(next)} <span style="color:var(--text-muted)">(${fmtDate(nextDate)})</span>` : esc(next);

    tooltip.innerHTML = `
      <div class="tt-name">${esc((p.identity && p.identity.name) || 'Untitled')}</div>
      <div class="tt-row">TRL <strong>${trl}</strong> · ${esc(trlBandName(trl))}</div>
      <div class="tt-row">Stage <strong>${stage}/5</strong> · ${esc(STAGE_NAMES[stage])}</div>
      <div class="tt-row"><span class="tt-rag ${rag}"></span> RAG: <strong>${esc(ragLabel(dot.dataset.rag))}</strong></div>
      <div class="tt-row">FTEs: <strong>${esc(fte)}</strong></div>
      <div class="tt-row" style="margin-top:6px;">Next: ${nextStr}</div>
      <div class="tt-hint">Click to open →</div>
    `;
    // Position above the dot
    const left = parseFloat(dot.style.left);
    const top  = parseFloat(dot.style.top);
    tooltip.style.left = left + '%';
    tooltip.style.top  = top + '%';
    tooltip.classList.add('show');
  }
  function hideTooltip() {
    tooltip.classList.remove('show');
  }

  dots.forEach(dot => {
    let startX = 0, startY = 0, origLeft = 0, origTop = 0;
    let dragging = false, moved = false;
    let pointerId = null;

    dot.addEventListener('mouseenter', () => {
      if (!dragging) showTooltip(dot);
    });
    dot.addEventListener('mouseleave', () => {
      hideTooltip();
    });

    dot.addEventListener('pointerdown', (e) => {
      pointerId = e.pointerId;
      dot.setPointerCapture(pointerId);
      startX = e.clientX;
      startY = e.clientY;
      origLeft = parseFloat(dot.style.left);
      origTop  = parseFloat(dot.style.top);
      dragging = true;
      moved = false;
      hideTooltip();
    });
    dot.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        moved = true;
        dot.classList.add('drag');
        const rect = grid.getBoundingClientRect();
        const newLeft = origLeft + (dx / rect.width) * 100;
        const newTop  = origTop  + (dy / rect.height) * 100;
        dot.style.left = Math.max(0, Math.min(100, newLeft)) + '%';
        dot.style.top  = Math.max(0, Math.min(100, newTop)) + '%';
      }
    });
    dot.addEventListener('pointerup', (e) => {
      if (pointerId != null) dot.releasePointerCapture(pointerId);
      pointerId = null;
      dragging = false;
      dot.classList.remove('drag');
      if (!moved) {
        // Click: open product
        const id = dot.dataset.productId;
        window.location.href = `product.html?portfolio=${portfolioId}&product=${id}`;
      }
    });
    dot.addEventListener('pointercancel', () => {
      pointerId = null;
      dragging = false;
      dot.classList.remove('drag');
    });
  });
}

function wireBench() {
  document.querySelectorAll('.bench-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.productId;
      window.location.href = `product.html?portfolio=${portfolioId}&product=${id}`;
    });
  });
}

/* ============================================================
   TOAST NOTIFICATION SYSTEM
   ============================================================ */
(function() {
  let container = null;
  function ensureContainer() {
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    return container;
  }
  const ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  function escSafe(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
  function show(opts) {
    if (typeof opts === 'string') opts = { message: opts };
    const o = Object.assign({ message:'', type:'info', duration:3200 }, opts);
    const c = ensureContainer();
    const el = document.createElement('div');
    el.className = 'toast ' + o.type;
    el.innerHTML = `<div class="toast-icon">${ICONS[o.type]||ICONS.info}</div><div class="toast-msg">${escSafe(o.message)}</div>`;
    c.appendChild(el);
    let t = null;
    function dismiss() { clearTimeout(t); el.classList.add('out'); setTimeout(() => el.remove(), 220); }
    if (o.duration > 0) t = setTimeout(dismiss, o.duration);
    el.onclick = dismiss;
    return { dismiss };
  }
  window.toast = {
    success: (msg, opts) => show(Object.assign({ message: msg, type: 'success' }, opts)),
    error:   (msg, opts) => show(Object.assign({ message: msg, type: 'error',   duration: 5000 }, opts)),
    info:    (msg, opts) => show(Object.assign({ message: msg, type: 'info' }, opts))
  };
})();
</script>
