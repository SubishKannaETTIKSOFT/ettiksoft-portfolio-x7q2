function dynamicSection(opts) {
  // opts: { num, title, hint, listKey, addLabel, blank, render }
  const sec = el('section', { class: 'sec' });
  sec.appendChild(el('div', { class: 'sec-head' },
    el('div', { class: 'num' }, opts.num),
    el('div', { class: 'title' }, opts.title),
    el('div', { class: 'hint' }, opts.hint)
  ));

  const list = el('div', { class: 'dyn-list' });
  sec.appendChild(list);

  function renderRows() {
    list.innerHTML = '';
    const items = roadmap.data[opts.listKey];
    if (items.length === 0) {
      list.appendChild(el('div', { class: 'empty-list' }, 'No items yet. Click the button below to add the first one.'));
    } else {
      items.forEach((item, i) => {
        const row = el('div', { class: 'dyn-row' });
        row.appendChild(el('div', { class: 'row-num' }, String(i + 1).padStart(2, '0')));
        row.appendChild(el('button', {
          class: 'del-btn',
          title: 'Remove',
          onclick: () => {
            if (!confirm('Remove this item?')) return;
            items.splice(i, 1);
            scheduleSave();
            renderRows();
          }
        }, '×'));
        opts.render(row, item, i);
        list.appendChild(row);
      });
    }
  }

  const addBtn = el('button', {
    class: 'add-btn',
    onclick: () => {
      roadmap.data[opts.listKey].push(JSON.parse(JSON.stringify(opts.blank)));
      scheduleSave();
      renderRows();
    }
  }, opts.addLabel);
  // Prepend a plus icon to the add button
  const plusIcon = el('span', { class: 'icn' });
  plusIcon.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" width=\"14\" height=\"14\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"/><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/></svg>`;
  addBtn.insertBefore(plusIcon, addBtn.firstChild);
  sec.appendChild(addBtn);

  renderRows();
  return sec;
}

// ============================================================
// TOAST NOTIFICATION SYSTEM
// ============================================================
(function() {
  let container = null;
  function ensureContainer() {
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    return container;
  }

  const ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    confirm: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
  };

  function show(opts) {
    if (typeof opts === 'string') opts = { message: opts };
    const o = Object.assign({
      message: '', type: 'info', duration: 3000,
      actions: null, onDismiss: null
    }, opts);

    const c = ensureContainer();
    const el = document.createElement('div');
    el.className = 'toast ' + o.type;

    const iconSvg = ICONS[o.type] || ICONS.info;
    el.innerHTML = '<div class="toast-icon">' + iconSvg + '</div><div class="toast-msg">' + escapeHtmlSafe(o.message) + '</div>';

    if (o.actions && o.actions.length) {
      const msgDiv = el.querySelector('.toast-msg');
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'toast-actions';
      o.actions.forEach(a => {
        const btn = document.createElement('button');
        btn.className = 'toast-btn ' + (a.variant || '');
        btn.textContent = a.label;
        btn.onclick = () => { dismiss(); if (a.onClick) a.onClick(); };
        actionsDiv.appendChild(btn);
      });
      msgDiv.appendChild(actionsDiv);
    }

    if (o.duration > 0) {
      const progress = document.createElement('div');
      progress.className = 'toast-progress';
      progress.style.animationDuration = o.duration + 'ms';
      el.appendChild(progress);
    }

    c.appendChild(el);

    let dismissTimer = null;
    function dismiss() {
      if (dismissTimer) clearTimeout(dismissTimer);
      el.classList.add('removing');
      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
        if (o.onDismiss) o.onDismiss();
      }, 300);
    }
    if (o.duration > 0) {
      dismissTimer = setTimeout(dismiss, o.duration);
    }

    el.addEventListener('mouseenter', () => {
      const p = el.querySelector('.toast-progress');
      if (p) p.style.animationPlayState = 'paused';
      if (dismissTimer) { clearTimeout(dismissTimer); dismissTimer = null; }
    });
    el.addEventListener('mouseleave', () => {
      if (o.duration > 0 && !el.classList.contains('removing')) {
        const p = el.querySelector('.toast-progress');
        if (p) p.style.animationPlayState = 'running';
        dismissTimer = setTimeout(dismiss, 1500);
      }
    });

    return { dismiss };
  }

  function escapeHtmlSafe(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  // Confirm-style toast with action buttons
  function confirm(message, opts) {
    opts = opts || {};
    return show({
      message: message,
      type: 'confirm',
      duration: 0,
      actions: [
        { label: opts.cancelLabel || 'Cancel', variant: '', onClick: opts.onCancel || (()=>{}) },
        { label: opts.confirmLabel || 'Confirm', variant: opts.danger ? 'danger' : 'primary', onClick: opts.onConfirm || (()=>{}) }
      ]
    });
  }

  window.toast = function(msg, type, duration) {
    if (typeof msg === 'object') return show(msg);
    return show({ message: msg, type: type || 'info', duration: duration });
  };
  window.toast.success = (msg, dur) => show({ message: msg, type: 'success', duration: dur || 2400 });
  window.toast.error   = (msg, dur) => show({ message: msg, type: 'error',   duration: dur || 4000 });
  window.toast.info    = (msg, dur) => show({ message: msg, type: 'info',    duration: dur || 3000 });
  window.toast.confirm = confirm;
})();

// ============================================================
// DRAG-AND-DROP REORDERING
// ============================================================
function makeRowDraggable(row, list, items, idx, onReorder) {
  row.dataset.idx = idx;
  row.draggable = true;

  // Add grab handle
  const handle = document.createElement('div');
  handle.className = 'drag-handle';
  handle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>';
  handle.title = 'Drag to reorder';
  row.appendChild(handle);

  row.addEventListener('dragstart', (e) => {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
    setTimeout(() => row.classList.add('dragging'), 0);
  });

  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    list.querySelectorAll('.dyn-row').forEach(r => {
      r.classList.remove('drop-target-above', 'drop-target-below');
    });
  });

  row.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const dragging = list.querySelector('.dragging');
    if (!dragging || dragging === row) return;
    const rect = row.getBoundingClientRect();
    const halfway = rect.top + rect.height / 2;
    list.querySelectorAll('.dyn-row').forEach(r => {
      r.classList.remove('drop-target-above', 'drop-target-below');
    });
    if (e.clientY < halfway) row.classList.add('drop-target-above');
    else row.classList.add('drop-target-below');
  });

  row.addEventListener('drop', (e) => {
    e.preventDefault();
    const dragging = list.querySelector('.dragging');
    if (!dragging || dragging === row) return;
    const fromIdx = +dragging.dataset.idx;
    const toIdx = +row.dataset.idx;
    if (isNaN(fromIdx) || isNaN(toIdx)) return;

    // Reorder data array
    const moved = items.splice(fromIdx, 1)[0];
    const rect = row.getBoundingClientRect();
    const insertAfter = e.clientY > rect.top + rect.height / 2;
    const adjustedToIdx = (toIdx > fromIdx ? toIdx - 1 : toIdx) + (insertAfter ? 1 : 0);
    items.splice(Math.max(0, Math.min(items.length, adjustedToIdx)), 0, moved);

    if (onReorder) onReorder();
  });
}

// ============================================================
// INTEGRATE DRAG-DROP + REPLACE EMPTY STATE WITH SVG
// Post-hoc enhancement of all already-rendered sections
// ============================================================
(function() {
  // Map listKey by section number — must match renderActions etc.
  const SECTION_LIST_KEYS = ['kpis', 'bets', 'actions', 'quarters', 'decisions', 'risks'];

  function enhanceSections() {
    const dynLists = document.querySelectorAll('.dyn-list');
    dynLists.forEach((list, sectionIdx) => {
      // Order of dyn-lists: kpis, bets, actions, quarters, decisions, risks
      const listKey = SECTION_LIST_KEYS[sectionIdx];
      if (!listKey || !roadmap.data[listKey]) return;

      enhanceList(list, listKey);
    });
  }

  function enhanceList(list, listKey) {
    const items = roadmap.data[listKey];

    function wireRows() {
      // Empty state replacement
      const emptyEl = list.querySelector('.empty-list');
      if (emptyEl && !emptyEl.querySelector('svg.empty-art')) {
        const currentText = emptyEl.textContent.trim();
        emptyEl.innerHTML = `
          <svg class="empty-art" viewBox="0 0 80 56" fill="none">
            <rect x="6" y="10" width="68" height="36" rx="4" stroke="currentColor" stroke-width="1.5"/>
            <line x1="14" y1="22" x2="50" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14" y1="30" x2="62" y2="30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14" y1="38" x2="42" y2="38" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div>${escapeOptHtml(currentText)}</div>
        `;
      }

      // Wire drag-drop on rows + replace delete with toast confirm
      const rows = list.querySelectorAll('.dyn-row');
      rows.forEach((row, i) => {
        if (!row.dataset.dragWired) {
          row.dataset.dragWired = '1';
          makeRowDraggable(row, list, items, i, () => {
            scheduleSave();
            rebuildList();
          });
        }
        // Replace delete button click handler to use toast confirm
        const delBtn = row.querySelector('.del-btn');
        if (delBtn && !delBtn.dataset.toastWired) {
          delBtn.dataset.toastWired = '1';
          const newDelBtn = delBtn.cloneNode(true);
          delBtn.parentNode.replaceChild(newDelBtn, delBtn);
          newDelBtn.dataset.toastWired = '1';
          newDelBtn.onclick = () => {
            window.toast.confirm('Remove this item?', {
              confirmLabel: 'Remove',
              danger: true,
              onConfirm: () => {
                items.splice(i, 1);
                scheduleSave();
                rebuildList();
                window.toast.success('Item removed');
              }
            });
          };
        }
      });
    }

    function rebuildList() {
      // Find this section's render function by reverse-engineering opts.
      // Easiest path: clear list and trigger re-render using add button's logic
      // But we don't have the render fn here. So instead: simulate by calling
      // the natural re-render path used elsewhere — manually rebuild via
      // direct DOM construction is too coupled to the original render.
      //
      // Cleanest approach: dispatch a custom 'rebuild' event. The original
      // dynamicSection had access to renderRows; we don't. So we use a hack:
      // remove all rows, then "re-add" by toggling the add-btn-equivalent.
      // BUT: the add btn appends a new item and rebuilds. We don't want to add.
      //
      // Best practical solution: full page reload of just this section by
      // re-running the section's add button click in a way that doesn't add.
      // OR: use the existing mechanism — simulate clicks programmatically.
      //
      // Pragmatic: just re-render manually using the row template stored
      // in the first row. For now, use the simplest: trigger location.reload()
      // is too aggressive. Let's manually clear + rebuild rows by inspecting
      // existing structure.

      // Save current scroll
      const scrollY = window.scrollY;
      // Remove all dyn-rows (preserves the empty-list and add-btn)
      list.querySelectorAll('.dyn-row').forEach(r => r.remove());
      // Trigger MutationObserver to re-show empty state if needed
      // Then trigger add-then-undo via the add button... no, that's hacky.
      // Best: navigate(window.location.href) to reload the editor with new data
      // Auto-save will have already persisted it.
      // BUT this resets scroll and is jarring.
      //
      // OPTIMAL: reach into the original closure. The list element's parent
      // section has the original render function bound. We can find the
      // add button's onclick — it does push() then re-renders. We can
      // do the inverse: temporarily push, click add, pop, click again.
      // Too fragile.
      //
      // FINAL APPROACH: just reload the page. Auto-save is fast (350ms).
      // First wait for save.
      setTimeout(() => {
        window.scrollTo(0, scrollY);
        window.location.reload();
      }, 400);
    }

    wireRows();

    // Observer for newly added rows (when user clicks + Add)
    const observer = new MutationObserver(wireRows);
    observer.observe(list, { childList: true, subtree: false });
  }

  // Run after the original script finishes constructing sections
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(enhanceSections, 0);
  } else {
    document.addEventListener('DOMContentLoaded', enhanceSections);
  }
})();

function escapeOptHtml(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// ============================================================
// LIVE PREVIEW PANE
// ============================================================
(function() {
  let pane = null;
  let iframe = null;
  let visible = false;
  let iframeReady = false;

  function build() {
    pane = document.createElement('aside');
    pane.className = 'preview-pane';

    // BULLETPROOF positioning: inline !important wins over ALL CSS rules.
    // No cache, no specificity battles, no surprises.
    const ps = pane.style;
    ps.setProperty('position', 'fixed', 'important');
    ps.setProperty('top', '0', 'important');
    ps.setProperty('right', '0', 'important');
    ps.setProperty('bottom', 'auto', 'important');
    ps.setProperty('left', 'auto', 'important');
    ps.setProperty('width', '45vw', 'important');
    ps.setProperty('max-width', '800px', 'important');
    ps.setProperty('min-width', '480px', 'important');
    ps.setProperty('height', '100vh', 'important');
    ps.setProperty('z-index', '80', 'important');
    ps.setProperty('transform', 'translateX(100%)', 'important');
    ps.setProperty('transition', 'transform 0.45s cubic-bezier(0.16, 1, 0.3, 1)', 'important');
    ps.setProperty('display', 'flex', 'important');
    ps.setProperty('flex-direction', 'column', 'important');
    ps.setProperty('margin', '0', 'important');
    ps.setProperty('background', 'rgba(255, 255, 255, 0.92)', 'important');
    ps.setProperty('backdrop-filter', 'blur(32px) saturate(180%)', 'important');
    ps.setProperty('-webkit-backdrop-filter', 'blur(32px) saturate(180%)', 'important');
    ps.setProperty('border-left', '1px solid rgba(255, 255, 255, 0.7)', 'important');
    ps.setProperty('border-radius', '0', 'important');
    ps.setProperty('box-shadow', '0 1px 0 0 rgba(255, 255, 255, 0.6) inset, -16px 0 56px -16px rgba(0, 0, 0, 0.45)', 'important');

    console.log('[preview] pane built with inline fixed positioning');

    pane.innerHTML = `
      <div class="preview-header">
        <div class="preview-title">
          <span class="live-dot"></span>
          <span>Live preview</span>
        </div>
        <div class="preview-actions">
          <button id="preview-open-new-tab" title="Open in new tab">Open ↗</button>
          <button id="preview-close" title="Close preview">Close ×</button>
        </div>
      </div>
      <div class="preview-skel" id="preview-skel">
        <div class="spinner"></div>
        <div>Loading preview…</div>
      </div>
    `;
    document.body.appendChild(pane);

    iframe = document.createElement('iframe');
    iframe.className = 'preview-iframe';
    iframe.style.display = 'none';

    // CRITICAL: attach onload BEFORE setting src.
    // Otherwise iframe may load from cache before handler is wired → spinner-forever.
    let loadedFlag = false;
    iframe.onload = () => {
      loadedFlag = true;
      const skel = pane.querySelector('#preview-skel');
      if (skel) skel.style.display = 'none';
      iframe.style.display = '';
    };

    // Timeout fallback: if iframe doesn't load in 6s, show error state
    setTimeout(() => {
      if (loadedFlag) return;
      const skel = pane.querySelector('#preview-skel');
      if (skel) {
        skel.innerHTML =
          '<div style="font-size:14px;color:#475569;text-align:center;line-height:1.5;">' +
          '<strong style="color:#0F172A;">Preview unavailable</strong><br>' +
          'The preview iframe didn\'t respond. ' +
          'Click <strong>Open ↗</strong> above to view the roadmap in a new tab.' +
          '</div>';
      }
    }, 6000);

    iframe.src = 'output.html?id=' + roadmap.id + '&preview=1';
    pane.appendChild(iframe);

    pane.querySelector('#preview-close').onclick = toggle;
    pane.querySelector('#preview-open-new-tab').onclick = () => {
      window.open('output.html?id=' + roadmap.id, '_blank');
    };

    // Listen for ready signal from iframe, then push current data
    window.addEventListener('message', (e) => {
      if (!e.data) return;
      if (e.data.type === 'preview-ready') {
        iframeReady = true;
        push();
      }
    });
  }

  function push() {
    if (iframe && iframe.contentWindow && iframeReady) {
      iframe.contentWindow.postMessage({ type: 'preview-update', roadmap: roadmap }, '*');
    }
  }

  function toggle() {
    if (!pane) build();
    visible = !visible;
    document.body.classList.toggle('preview-on', visible);
    pane.classList.toggle('visible', visible);
    // Bulletproof slide animation via inline style
    pane.style.setProperty('transform', visible ? 'translateX(0)' : 'translateX(100%)', 'important');
    const btn = document.getElementById('preview-toggle-btn');
    if (btn) {
      btn.classList.toggle('primary', visible);
      btn.querySelector('.label-text').textContent = visible ? 'Hide preview' : 'Preview';
    }
    if (visible && iframeReady) push();
  }

  // Hook into persist() so the preview updates after every save
  if (typeof persist === 'function') {
    const _origPersist = persist;
    window.persist = function() {
      _origPersist();
      if (visible) push();
    };
  }

  // Also push on any input event (for instant feel even before debounced save)
  document.addEventListener('input', () => {
    if (visible) clearTimeout(window._previewPushT);
    window._previewPushT = setTimeout(push, 250);
  });

  // Wire toggle button — added in HTML modification below
  setTimeout(() => {
    const btn = document.getElementById('preview-toggle-btn');
    if (btn) btn.onclick = toggle;
  }, 50);

  // Keyboard shortcut: Cmd/Ctrl + P toggles preview
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'p' && !e.shiftKey) {
      e.preventDefault();
      toggle();
    }
  });
})();


// ============================================================
// 3D CURSOR TILT + SPOTLIGHT — applied to glass cards
// ============================================================
(function() {
  const TILT_SELECTOR = '.card, .bet, .product, .risk-card, .kpi';
  const MAX_TILT = 5;  // degrees

  function wire(el) {
    if (el.dataset.tiltWired) return;
    el.dataset.tiltWired = '1';

    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const rotY = ((x - cx) / cx) * MAX_TILT;
      const rotX = -((y - cy) / cy) * MAX_TILT;
      el.style.transform = `perspective(1200px) rotateX(${rotX.toFixed(2)}deg) rotateY(${rotY.toFixed(2)}deg) translateY(-3px)`;
      el.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
      el.style.setProperty('--my', `${(y / rect.height) * 100}%`);
    });

    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  }

  function wireAll() {
    document.querySelectorAll(TILT_SELECTOR).forEach(wire);
  }

  // Skip tilt if user prefers reduced motion
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  wireAll();

  // Re-wire after dynamic content changes (search filter, drag-drop, etc.)
  const observer = new MutationObserver(() => {
    clearTimeout(window._tiltDebounce);
    window._tiltDebounce = setTimeout(wireAll, 50);
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();


// === Override prior tilt with gentler version ===
(function() {
  // Remove the old wired-tilt flag so we can re-wire with calmer values
  document.querySelectorAll('[data-tilt-wired="1"]').forEach(el => {
    delete el.dataset.tiltWired;
    // Clear any inflight transform
    el.style.transform = '';
  });

  const SELECTOR = '.card, .bet, .product, .risk-card, .kpi';
  const MAX_TILT = 2.2; // was 5

  function wire(el) {
    if (el.dataset.calmTilt) return;
    el.dataset.calmTilt = '1';

    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const rotY = ((x - cx) / cx) * MAX_TILT;
      const rotX = -((y - cy) / cy) * MAX_TILT;
      el.style.transform = `perspective(1400px) rotateX(${rotX.toFixed(2)}deg) rotateY(${rotY.toFixed(2)}deg) translateY(-2px)`;
      el.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
      el.style.setProperty('--my', `${(y / rect.height) * 100}%`);
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  }

  function wireAll() { document.querySelectorAll(SELECTOR).forEach(wire); }

  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  wireAll();
  const obs = new MutationObserver(() => {
    clearTimeout(window._calmTiltDebounce);
    window._calmTiltDebounce = setTimeout(wireAll, 60);
  });
  obs.observe(document.body, { childList: true, subtree: true });
})();
