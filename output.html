  }, 80);
})();

// ============================================================
// ANIMATED KPI COUNTERS
// ============================================================
(function() {
  if (typeof IntersectionObserver === 'undefined') return;
  setTimeout(() => {
    const nums = document.querySelectorAll('.kpi .num');
    nums.forEach(numEl => {
      const text = numEl.firstChild ? numEl.firstChild.textContent : '';
      const numericMatch = text.match(/^-?\d+$/);
      if (!numericMatch) return; // skip non-numeric (like "Q3" or "₹4-8L")

      const target = parseInt(numericMatch[0], 10);
      const small = numEl.querySelector('small');
      // Hold target rendered; replace number when in view
      numEl.firstChild.textContent = '0';

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            observer.disconnect();
            numEl.classList.add('counting');
            const start = performance.now();
            const duration = 1100;
            function tick(now) {
              const t = Math.min((now - start) / duration, 1);
              const eased = 1 - Math.pow(1 - t, 4);
              const current = Math.floor(target * eased);
              numEl.firstChild.textContent = current;
              if (t < 1) requestAnimationFrame(tick);
              else {
                numEl.firstChild.textContent = target;
                setTimeout(() => numEl.classList.remove('counting'), 400);
              }
            }
            requestAnimationFrame(tick);
          }
        });
      }, { threshold: 0.5 });
      observer.observe(numEl);
    });
  }, 120);
})();

(function() {

  function currentRender() {

  });

  // Tell parent we're ready (only after first render is complete)
  function signalReady() {
    if (window.parent && window.parent !== window) {
      try { window.parent.postMessage({ type: 'preview-ready' }, '*'); } catch(e) {}
    }
  }
  // Fire on load + as a fallback after a short delay (in case load already passed)
  if (document.readyState === 'complete') {
    setTimeout(signalReady, 0);
  } else {
    window.addEventListener('load', signalReady);
    setTimeout(signalReady, 250);  // belt-and-braces

})();

// ============================================================
// 3D CURSOR TILT + SPOTLIGHT — applied to glass cards
// ============================================================
(function() {
  const TILT_SELECTOR = '.card, .bet, .product, .risk-card, .kpi';
  const MAX_TILT = 5;  // degrees

  function wire(el) {
    if (el.dataset.tiltWired) return;
    el.dataset.tiltWired = '1';

    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const rotY = ((x - cx) / cx) * MAX_TILT;
      const rotX = -((y - cy) / cy) * MAX_TILT;
      el.style.transform = `perspective(1200px) rotateX(${rotX.toFixed(2)}deg) rotateY(${rotY.toFixed(2)}deg) translateY(-3px)`;
      el.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
      el.style.setProperty('--my', `${(y / rect.height) * 100}%`);
    });

    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  }

  function wireAll() {
    document.querySelectorAll(TILT_SELECTOR).forEach(wire);
  }

  // Skip tilt if user prefers reduced motion
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  wireAll();

  // Re-wire after dynamic content changes (search filter, drag-drop, etc.)
  const observer = new MutationObserver(() => {
    clearTimeout(window._tiltDebounce);
    window._tiltDebounce = setTimeout(wireAll, 50);
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();


// === Override prior tilt with gentler version ===
(function() {
  // Remove the old wired-tilt flag so we can re-wire with calmer values
  document.querySelectorAll('[data-tilt-wired="1"]').forEach(el => {
    delete el.dataset.tiltWired;
    // Clear any inflight transform
    el.style.transform = '';
  });

  const SELECTOR = '.card, .bet, .product, .risk-card, .kpi';
  const MAX_TILT = 2.2; // was 5

  function wire(el) {
    if (el.dataset.calmTilt) return;
    el.dataset.calmTilt = '1';

    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const rotY = ((x - cx) / cx) * MAX_TILT;
      const rotX = -((y - cy) / cy) * MAX_TILT;
      el.style.transform = `perspective(1400px) rotateX(${rotX.toFixed(2)}deg) rotateY(${rotY.toFixed(2)}deg) translateY(-2px)`;
      el.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
      el.style.setProperty('--my', `${(y / rect.height) * 100}%`);
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  }

  function wireAll() { document.querySelectorAll(SELECTOR).forEach(wire); }

  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  wireAll();
  const obs = new MutationObserver(() => {
    clearTimeout(window._calmTiltDebounce);
    window._calmTiltDebounce = setTimeout(wireAll, 60);
  });
  obs.observe(document.body, { childList: true, subtree: true });
})();
