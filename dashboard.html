<style>
/* ============================================================
   TIDELAND DESIGN TOKENS
   ============================================================ */
:root {
  --base-bg:       var(--bg-page);
  --primary:       var(--brand-primary);
  --primary-dark:  #2C4A52;
  --secondary:     #B5A491;
  --anchor:        #2C4A52;
  --highlight:     #C99B6B;
  --text:          #1F2937;
  --text-muted:    #6B7280;
  --glass-bg-t:    rgba(255, 255, 252, 0.70);
  --glass-border-t:rgba(46, 74, 82, 0.10);
  --shadow-sm:     0 1px 3px rgba(44,74,82,0.08), 0 4px 12px rgba(44,74,82,0.06);
  --shadow-md:     0 2px 8px rgba(44,74,82,0.10), 0 8px 24px rgba(44,74,82,0.08);
  --shadow-lg:     0 4px 16px rgba(44,74,82,0.12), 0 16px 48px rgba(44,74,82,0.10);
  --radius-sm:     10px;
  --radius-md:     16px;
  --radius-lg:     20px;
  --radius-pill:   999px;
  --mono:          'Geist Mono', ui-monospace, monospace;
  --sans:          'Geist', -apple-system, sans-serif;
  --ease:          cubic-bezier(0.16, 1, 0.3, 1);
  --t-fast:        120ms;
  --t-base:        220ms;
  --t-slow:        380ms;

  /* Status colours */
  --rag-g:    #16A34A;
  --rag-g-bg: #DCFCE7;
  --rag-a:    #D97706;
  --rag-a-bg: #FEF3C7;
  --rag-r:    #DC2626;
  --rag-r-bg: #FEE2E2;

  /* TRL band colours */
  --trl-research: var(--secondary);
  --trl-dev:      var(--primary);
  --trl-deploy:   var(--anchor);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; font-size: 15px; }

body {
  font-family: var(--sans);
  background: var(--base-bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   SCHEMATIC BACKGROUND
   ============================================================ */
.schematic-bg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.14;
  filter: blur(0.5px) saturate(0.8);
}

/* ============================================================
   DEPTH ORBS
   ============================================================ */
.depth-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.depth-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(85px);
}
.depth-orb.o1 {
  width: 700px; height: 700px;
  top: -180px; left: -120px;
  background: radial-gradient(circle at 40% 40%, var(--brand-primary) 0%, transparent 70%);
  opacity: 0.22;
  animation: orbDrift1 100s ease-in-out infinite;
}
.depth-orb.o2 {
  width: 600px; height: 600px;
  bottom: -100px; right: -80px;
  background: radial-gradient(circle at 60% 60%, #B5A491 0%, transparent 70%);
  opacity: 0.20;
  animation: orbDrift2 120s ease-in-out infinite;
}
.depth-orb.o3 {
  width: 480px; height: 480px;
  top: 40%; left: 55%;
  background: radial-gradient(circle at 50% 50%, #C99B6B 0%, transparent 70%);
  opacity: 0.12;
  animation: orbDrift3 100s ease-in-out infinite;
}
@keyframes orbDrift1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(60px,-40px) scale(1.04); }
  66%      { transform: translate(-30px,50px) scale(0.97); }
}
@keyframes orbDrift2 {
  0%,100% { transform: translate(0,0) scale(1); }
  40%      { transform: translate(-50px,30px) scale(1.05); }
  70%      { transform: translate(40px,-20px) scale(0.96); }
}
@keyframes orbDrift3 {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  50%      { transform: translate(-52%,-48%) scale(1.06); }
}

/* ============================================================
   PAGE WRAPPER
   ============================================================ */
.page {
  position: relative;
  z-index: 1;
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  background: rgba(250, 250, 250, 0.88);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border-bottom: 1px solid var(--glass-border-t);
  margin: 0 -24px;
  padding-left: 24px;
  padding-right: 24px;
}
.topbar-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-meta {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  border: 1px solid var(--glass-border-t);
  background: var(--glass-bg-t);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text);
  text-decoration: none;
  transition: background var(--t-fast) var(--ease),
              border-color var(--t-fast) var(--ease),
              box-shadow var(--t-fast) var(--ease);
  white-space: nowrap;
}
.btn:hover {
  background: rgba(255,255,252,0.90);
  border-color: rgba(232,51,74,0.25);
  box-shadow: var(--shadow-sm);
}
.btn.primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--anchor) 100%);
  color: #fff;
  border-color: transparent;
}
.btn.primary:hover {
  background: var(--brand-primary-hover);
  box-shadow: 0 4px 12px rgba(44,74,82,0.30);
}
.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.btn.ghost:hover {
  background: rgba(232,51,74,0.08);
  color: var(--text);
}
.btn .icn { display: inline-flex; align-items: center; }
.btn[disabled], .btn.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

/* ============================================================
   GLASS CARD
   ============================================================ */
.card {
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  box-shadow: var(--shadow-md);
  transition: box-shadow var(--t-base) var(--ease),
              transform var(--t-base) var(--ease);
}

/* ============================================================
   CONTEXT SUMMARY
   ============================================================ */
.context-summary {
  padding: 24px 28px;
  margin-top: 24px;
}
.context-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  font-family: var(--mono);
  margin-bottom: 10px;
}
.context-headline {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 16px;
}
.context-headline .accent {
  background: linear-gradient(135deg, var(--primary) 0%, var(--anchor) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.context-bets {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.bet-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: rgba(232,51,74,0.10);
  border: 1px solid rgba(232,51,74,0.18);
  border-radius: var(--radius-pill);
  font-size: 12px;
  color: var(--anchor);
  font-weight: 500;
}
.bet-pill .bet-verb {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.context-quarter {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.quarter-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--highlight); flex-shrink: 0; }
.context-empty {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

/* ============================================================
   PRODUCTS SECTION HEADER
   ============================================================ */
.section-head {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 40px 0 20px;
}
.section-num {
  font-size: 10px;
  font-weight: 600;
  color: var(--primary);
  font-family: var(--mono);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-num::before {
  content: '';
  display: block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--primary);
}
.section-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.section-count {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-muted);
  font-weight: 600;
  letter-spacing: 0.06em;
}

/* ============================================================
   PRODUCTS GRID
   ============================================================ */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ============================================================
   PRODUCT CARD
   ============================================================ */
.product-card {
  padding: 20px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.product-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.product-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 14px;
}
.product-type-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  background: rgba(232,51,74,0.12);
  border: 1px solid rgba(232,51,74,0.18);
}
.product-type-icon.hardware { background: rgba(201,155,107,0.12); border-color: rgba(201,155,107,0.22); }
.product-type-icon.service  { background: rgba(44,74,82,0.10);    border-color: rgba(44,74,82,0.18); }
.product-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
}
.product-owner {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* chips row */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  border: 1px solid transparent;
}
.chip.trl-research  { background: rgba(181,164,145,0.18); color: #7A6650; border-color: rgba(181,164,145,0.30); }
.chip.trl-dev       { background: rgba(232,51,74,0.15);  color: var(--primary); border-color: rgba(232,51,74,0.25); }
.chip.trl-deploy    { background: rgba(44,74,82,0.12);    color: var(--anchor); border-color: rgba(44,74,82,0.20); }
.chip.trl-none      { background: rgba(107,114,128,0.10); color: var(--text-muted); border-color: rgba(107,114,128,0.18); }
.chip.stage         { background: rgba(201,155,107,0.12); color: #8B6B35; border-color: rgba(201,155,107,0.22); }
.chip.comm          { background: rgba(232,51,74,0.08);  color: var(--primary); border-color: rgba(232,51,74,0.16); }

/* RAG dot */
.rag-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.7);
}
.rag-dot.G { background: var(--rag-g); }
.rag-dot.A { background: var(--rag-a); }
.rag-dot.R { background: var(--rag-r); }

/* milestone */
.product-milestone {
  border-top: 1px solid var(--glass-border-t);
  padding-top: 12px;
  margin-top: 4px;
}
.milestone-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
  font-family: var(--mono);
  margin-bottom: 3px;
}
.milestone-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.milestone-date {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--mono);
  margin-top: 3px;
}

/* ============================================================
   ADD PRODUCT TILE
   ============================================================ */
.add-product-tile {
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  border: 2px dashed rgba(232,51,74,0.25);
  background: rgba(232,51,74,0.04);
  transition: border-color var(--t-base) var(--ease),
              background var(--t-base) var(--ease);
  min-height: 160px;
  text-align: center;
}
.add-product-tile:hover {
  border-color: rgba(232,51,74,0.45);
  background: rgba(232,51,74,0.08);
  box-shadow: none;
  transform: none;
}
.add-product-tile .add-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(232,51,74,0.12);
  border: 1px solid rgba(232,51,74,0.20);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.add-product-tile .add-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
}
.add-product-tile .add-hint {
  font-size: 11px;
  color: var(--text-muted);
}

/* ============================================================
   FOOTER
   ============================================================ */
.foot {
  margin-top: 64px;
  padding: 20px 24px;
  border-radius: var(--radius-md);
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
}

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 13px 16px;
  border-radius: 14px;
  min-width: 240px;
  max-width: 380px;
  background: rgba(31,41,55,0.94);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 8px 32px rgba(0,0,0,0.32);
  color: #fff;
  font-size: 13.5px;
  pointer-events: auto;
  position: relative;
  overflow: hidden;
  animation: toastIn var(--t-base) var(--ease) forwards;
}
.toast.out { animation: toastOut var(--t-base) var(--ease) forwards; }
@keyframes toastIn  { from { opacity:0; transform:translateY(12px) scale(0.96); } to { opacity:1; transform:none; } }
@keyframes toastOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(8px) scale(0.97); } }
.toast-icon { flex-shrink:0; opacity:0.85; }
.toast-msg  { flex:1; line-height:1.45; color:#fff; }
.toast-progress {
  position:absolute; bottom:0; left:0; height:2px;
  background:rgba(255,255,255,0.25);
  width:100%;
  transform-origin:left;
  animation: shrink linear forwards;
}
@keyframes shrink { from { transform:scaleX(1); } to { transform:scaleX(0); } }
.toast-actions { display:flex; gap:8px; margin-top:10px; }
.toast-btn { padding:5px 12px; border-radius:8px; font-size:12px; font-weight:600; font-family:var(--sans); cursor:pointer; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.12); color:#fff; transition:background var(--t-fast); }
.toast-btn:hover { background:rgba(255,255,255,0.22); }
.toast-btn.primary { background:var(--primary); border-color:var(--primary); }

/* ============================================================
   ENTER ANIMATIONS
   ============================================================ */
.rise { opacity:0; transform:translateY(14px); animation:rise var(--t-slow) var(--ease) forwards; }
.d1 { animation-delay: 60ms; }
.d2 { animation-delay:120ms; }
.d3 { animation-delay:180ms; }
.d4 { animation-delay:240ms; }
@keyframes rise { to { opacity:1; transform:none; } }

/* ============================================================
   NOT FOUND STATE
   ============================================================ */
.notfound {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}
.notfound h2 { font-size: 22px; color: var(--text); margin-bottom: 12px; }
.notfound a  { color: var(--primary); text-decoration: none; font-weight: 500; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  .page { padding: 0 16px 48px; }
  .topbar { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
  .products-grid { grid-template-columns: 1fr; }
  .topbar-meta { display: none; }
  .context-headline { font-size: 18px; }
}
@media (max-width: 480px) {
  .topbar-actions .btn span:not(.icn) { display: none; }
}

/* ---- READ-ONLY MODE ---- */
.readonly-banner {
  background: rgba(44,74,82,0.08);
  border: 1px solid rgba(44,74,82,0.14);
  border-radius: 12px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.readonly-banner strong { color: var(--text); }
.readonly-banner a { color: var(--primary); font-weight: 600; text-decoration: none; }
.readonly-banner a:hover { text-decoration: underline; }
.readonly-banner .ro-lock { flex-shrink: 0; opacity: 0.55; }
body.read-only #snapshot-btn,
body.read-only #edit-context-btn,
body.read-only #add-product-btn { display: none !important; }
/* product cards remain clickable in read-only mode — they open product.html?readonly=1 */

/* ---- POLISH C3 ---- */
/* Slim sage scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(232,51,74,0.38); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(232,51,74,0.58); }
* { scrollbar-width: thin; scrollbar-color: rgba(232,51,74,0.38) transparent; }

/* Topbar button height */
.topbar .btn, .topbar button.btn, .topbar a.btn { min-height: 36px; }

@media (max-width: 768px) {
  .topbar { flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
  .topbar-actions { flex-wrap: wrap; gap: 6px; }
  .products-grid { grid-template-columns: 1fr; }
  .page { padding: 16px 12px 40px; }
  .context-bets { flex-direction: column; gap: 6px; }
}

/* ---- SECURITY FOOTER NOTICE ---- */
.sec-footer-notice {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--secondary, #B5A491);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(181,164,145,0.25);
}
/* ---- END SECURITY FOOTER NOTICE ---- */
</style>
  <script src="./auth.js"></script>
  <script src="./auth-guard.js"></script>

const STORAGE_KEY = 'roadmap-builder.portfolios';

function loadPortfolios() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function savePortfolios(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}
function uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'p-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}
function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' }); }
  catch(e) { return iso; }
}
function fmtRelative(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return fmtDate(iso);
}

function trlBand(trl) {
  if (trl == null) return { cls: 'trl-none', label: 'Not assessed' };
  if (trl <= 3)    return { cls: 'trl-research', label: `TRL ${trl} · Research` };
  if (trl <= 6)    return { cls: 'trl-dev',      label: `TRL ${trl} · Development` };
  return               { cls: 'trl-deploy',    label: `TRL ${trl} · Deployment` };
}

function maturityLabel(type, level) {
  if (type === 'service' || level == null) return null;
  if (type === 'hardware') return `MRL ${level}`;
  const labels = ['', 'Concept', 'Pilot', 'Limited', 'Production', 'Scaled'];
  return `OR ${level}${labels[level] ? ' · ' + labels[level] : ''}`;
}

function typeIcon(type) {
  if (type === 'hardware') return '🔩';
  if (type === 'service')  return '◌';
  return '▣';
}

/* ============================================================
   ACCENT WORD HELPER
   ============================================================ */
function applyAccent(headline, accent) {
  if (!accent || !accent.trim()) return esc(headline);
  const re = new RegExp('\\b(' + accent.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')\\b', 'i');
  return esc(headline).replace(re, '<span class="accent">$1</span>');
}

/* ============================================================
   GUIDED TOUR  v1.0
   Each page sets window.__TOUR_PAGE_STEPS (array of step nums)
   and window.__TOUR_STEP_TARGETS (step->CSS selector string).
   This IIFE is identical across all 5 tour pages.
   ============================================================ */
(function tourInit() {
  var SEEN_KEY    = 'roadmap-builder.tour-seen';
  var STEP_KEY    = 'roadmap-builder.tour-step';
  var TOTAL       = 7;
  var PAGE_STEPS  = window.__TOUR_PAGE_STEPS   || [];
  var STEP_TARGETS= window.__TOUR_STEP_TARGETS || {};

  var STEPS = {
    1: 'Start here. Create a portfolio for your product line. A portfolio holds all your products and generates your board outputs.',
    2: 'Your portfolio dashboard. Add each product you want to track. Each gets its own assessment.',
    3: 'Assess each product’s Technology Readiness Level. Be honest and conservative — TRL is retrospective, based on what’s already demonstrated.',
    4: 'Track regulatory alignment per product. ISO 21434 and AIS-189 are the two that matter most for your OEM conversations.',
    5: 'The heatmap plots your entire portfolio on one slide. Dot size = investment. Color = health. Use this in board meetings.',
    6: 'Each dot is a product. Hover for details, click to open the assessment. The goal: move products up and to the right over time.',
    7: 'Generate your board deck. Download a self-contained file you can email or present offline. Updates automatically as your data changes.'
  };

  function getPortfolios() {
    try { return JSON.parse(localStorage.getItem('roadmap-builder.portfolios') || '[]'); } catch(e) { return []; }
  }
  function firstActivePortfolio() {
    var all = getPortfolios();
    for (var i = 0; i < all.length; i++) { if (!all[i].isSnapshot) return all[i]; }
    return null;
  }
  function firstProduct(pf) {
    return (pf && pf.products && pf.products.length) ? pf.products[0] : null;
  }
  function getStep()  { return parseInt(localStorage.getItem(STEP_KEY)) || 1; }
  function setStep(n) { localStorage.setItem(STEP_KEY, String(n)); }
  function markSeen() { localStorage.setItem(SEEN_KEY, 'true'); localStorage.removeItem(STEP_KEY); }
  function isSeen()   { return !!localStorage.getItem(SEEN_KEY); }

  function wireRetrigger() {
    var btn = document.getElementById('tour-retrigger-btn');
    if (!btn) return;
    btn.onclick = function() {
      localStorage.removeItem(SEEN_KEY);
      localStorage.removeItem(STEP_KEY);
      window.location.href = 'index.html';
    };
  }

  // Wire [?] button regardless of seen state
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', wireRetrigger);
  } else {
    wireRetrigger();
  }
  if (isSeen()) return;

  var currentStep = getStep();
  if (!PAGE_STEPS.length || PAGE_STEPS.indexOf(currentStep) === -1) return;

  // ── Injected styles ───────────────────────────────────────────────────
  function injectStyles() {
    if (document.getElementById('tour-styles')) return;
    var s = document.createElement('style');
    s.id = 'tour-styles';
    s.textContent =
      '#tour-overlay{position:fixed;inset:0;z-index:9000;pointer-events:none;}' +
      '#tour-spotlight{position:fixed;z-index:9001;pointer-events:none;border-radius:10px;' +
        'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);outline:2px solid rgba(255,255,255,0.55);' +
        'transition:top 220ms cubic-bezier(0.16,1,0.3,1),left 220ms cubic-bezier(0.16,1,0.3,1),' +
        'width 220ms cubic-bezier(0.16,1,0.3,1),height 220ms cubic-bezier(0.16,1,0.3,1);}' +
      '#tour-tooltip{position:fixed;z-index:9002;pointer-events:auto;' +
        'background:rgba(255,255,252,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);' +
        'border:1px solid rgba(232,51,74,0.25);border-radius:14px;' +
        'box-shadow:0 8px 32px rgba(44,74,82,0.22);' +
        'padding:18px 20px 20px;width:480px;max-width:calc(100vw - 32px);}' +
      '.tour-step-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}' +
      '.tour-step-badge{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;' +
        'font-family:ui-monospace,monospace;color:var(--brand-primary);' +
        'background:rgba(232,51,74,0.10);border:1px solid rgba(232,51,74,0.18);' +
        'padding:2px 8px;border-radius:999px;}' +
      '.tour-x-btn{background:none;border:none;cursor:pointer;pointer-events:auto;' +
        'color:#6B7280;font-size:16px;line-height:1;padding:2px 6px;border-radius:6px;}' +
      '.tour-x-btn:hover{background:rgba(107,114,128,0.10);color:#1F2937;}' +
      '.tour-edge-msg{font-size:12.5px;color:#92400E;background:rgba(217,119,6,0.08);' +
        'border:1px solid rgba(217,119,6,0.22);border-radius:8px;' +
        'padding:8px 12px;margin-bottom:12px;line-height:1.5;font-family:inherit;}' +
      '.tour-text{font-size:13.5px;line-height:1.58;color:#1F2937;' +
        'margin-bottom:16px;font-family:-apple-system,system-ui,sans-serif;}' +
      '.tour-actions{display:flex;align-items:center;gap:6px;}' +
      '.tour-spacer{flex:1;}' +
      '.tour-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;' +
        'font-size:12px;font-weight:600;font-family:-apple-system,system-ui,sans-serif;' +
        'cursor:pointer;pointer-events:auto;border:1px solid rgba(46,74,82,0.15);' +
        'transition:all 120ms ease;white-space:nowrap;}' +
      '.tour-btn.t-ghost{background:transparent;color:#6B7280;}' +
      '.tour-btn.t-ghost:hover{background:rgba(232,51,74,0.08);color:#1F2937;}' +
      '.tour-btn.t-primary{background:linear-gradient(135deg,var(--brand-primary) 0%,#2C4A52 100%);' +
        'color:#fff;border-color:transparent;}' +
      '.tour-btn.t-primary:hover{opacity:0.88;}' +
      '.tour-btn:disabled{opacity:0.38;cursor:not-allowed;pointer-events:none;}' +
      '#tour-retrigger-btn{display:inline-flex;align-items:center;justify-content:center;' +
        'width:26px;height:26px;border-radius:50%;border:1px solid rgba(46,74,82,0.18);' +
        'background:rgba(255,255,252,0.70);backdrop-filter:blur(8px);' +
        'font-size:12px;font-weight:700;color:#6B7280;cursor:pointer;' +
        'font-family:ui-monospace,monospace;transition:all 120ms ease;flex-shrink:0;line-height:1;}' +
      '#tour-retrigger-btn:hover{background:rgba(232,51,74,0.12);color:var(--brand-primary);' +
        'border-color:rgba(232,51,74,0.30);}';
    document.head.appendChild(s);
  }

  // ── Overlay DOM ───────────────────────────────────────────────────────
  function buildOverlay() {
    if (document.getElementById('tour-overlay')) return;
    var ov = document.createElement('div');
    ov.id = 'tour-overlay';
    ov.innerHTML =
      '<div id="tour-spotlight"></div>' +
      '<div id="tour-tooltip">' +
        '<div class="tour-step-row">' +
          '<span class="tour-step-badge" id="tour-step-badge">1 of ' + TOTAL + '</span>' +
          '<button class="tour-x-btn" id="tour-x" title="Skip tour">×</button>' +
        '</div>' +
        '<div class="tour-edge-msg" id="tour-edge-msg" style="display:none"></div>' +
        '<div class="tour-text" id="tour-text"></div>' +
        '<div class="tour-actions">' +
          '<button class="tour-btn t-ghost" id="tour-back">← Back</button>' +
          '<span class="tour-spacer"></span>' +
          '<button class="tour-btn t-ghost" id="tour-skip">Skip tour</button>' +
          '<button class="tour-btn t-primary" id="tour-next">Next →</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);
  }

  // ── Spotlight + tooltip positioning ──────────────────────────────────
  function positionSpotlight(el) {
    var spot = document.getElementById('tour-spotlight');
    var tip  = document.getElementById('tour-tooltip');
    if (!spot || !tip) return;
    if (!el) {
      spot.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;' +
        'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);border-radius:10px;';
      tip.style.top = ''; tip.style.bottom = '32px';
      tip.style.left = '50%';
      tip.style.transform = 'translateX(-50%)';
      return;
    }
    tip.style.transform = '';
    var pad = 8;
    var r   = el.getBoundingClientRect();
    spot.style.cssText =
      'position:fixed;' +
      'top:'    + (r.top    - pad) + 'px;' +
      'left:'   + (r.left   - pad) + 'px;' +
      'width:'  + (r.width  + pad * 2) + 'px;' +
      'height:' + (r.height + pad * 2) + 'px;' +
      'border-radius:10px;' +
      'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);' +
      'outline:2px solid rgba(255,255,255,0.55);';
    // Fixed bottom centre — spotlight tracks element, tooltip stays put
    tip.style.top = ''; tip.style.bottom = '32px';
    tip.style.left = '50%';
    tip.style.transform = 'translateX(-50%)';
  }

  // ── Step rendering ────────────────────────────────────────────────────
  var activeStep = currentStep;

  function renderStep(step) {
    activeStep = step;
    var badge   = document.getElementById('tour-step-badge');
    var textEl  = document.getElementById('tour-text');
    var edgeEl  = document.getElementById('tour-edge-msg');
    var backBtn = document.getElementById('tour-back');
    var nextBtn = document.getElementById('tour-next');
    if (badge)   badge.textContent  = step + ' of ' + TOTAL;
    if (textEl)  textEl.textContent = STEPS[step] || '';
    if (edgeEl)  edgeEl.style.display = 'none';
    if (backBtn) backBtn.disabled   = (step === 1);
    if (nextBtn) { nextBtn.textContent = (step === TOTAL) ? 'Finish ✓' : 'Next →'; nextBtn.disabled = false; }

    // Edge case: step 1 and no portfolio
    if (step === 1 && edgeEl) {
      if (!firstActivePortfolio()) {
        edgeEl.textContent = 'Create your portfolio first using the button below. The tour will continue automatically when you land on the dashboard.';
        edgeEl.style.display = 'block';
        if (nextBtn) nextBtn.disabled = true;
      }
    }
    var sel = STEP_TARGETS[step];
    var el  = sel ? document.querySelector(sel) : null;
    setTimeout(function() { positionSpotlight(el); }, 60);
  }

  // ── Navigation ────────────────────────────────────────────────────────
  function navTo(step) {
    var pf = firstActivePortfolio();
    var pr = pf ? firstProduct(pf) : null;

    // Same-page transitions (product.html steps 3 <-> 4)
    var onProductPage = (PAGE_STEPS.indexOf(3) !== -1 || PAGE_STEPS.indexOf(4) !== -1);
    if (onProductPage && (step === 3 || step === 4)) {
      setStep(step);
      var targetId = (step === 3) ? 's2' : 's7';
      var targetEl = document.getElementById(targetId);
      if (targetEl) {
        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(function() { renderStep(step); }, 350);
      } else {
        renderStep(step);
      }
      return;
    }

    setStep(step);
    switch (step) {
      case 1: window.location.href = 'index.html'; break;
      case 2: if (pf) { window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id); } break;
      case 3:
        if (pf && pr) {
          window.location.href = 'product.html?portfolio=' + encodeURIComponent(pf.id) + '&product=' + encodeURIComponent(pr.id);
        } else {
          // No products yet: skip to step 5
          setStep(5);
          if (pf) window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id);
        }
        break;
      case 5: if (pf) { window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id); } break;
      case 6: if (pf) { window.location.href = 'heatmap.html?id='   + encodeURIComponent(pf.id); } break;
      case 7: if (pf) { window.location.href = 'deck.html?id='      + encodeURIComponent(pf.id); } break;
    }
  }

  function doNext() {
    var step = activeStep;
    if (step === TOTAL) { markSeen(); var ov = document.getElementById('tour-overlay'); if (ov) ov.remove(); return; }
    if (step === 1 && !firstActivePortfolio()) return; // edge: no portfolio
    if (step === 3) { navTo(4); return; }
    if (step === 4) { navTo(5); return; }
    navTo(step + 1);
  }

  function doBack() {
    var step = activeStep;
    if (step <= 1) return;
    if (step === 4) { navTo(3); return; }
    navTo(step - 1);
  }

  function doSkip() {
    markSeen();
    var ov = document.getElementById('tour-overlay');
    if (ov) ov.remove();
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  function init() {
    wireRetrigger();
    injectStyles();
    buildOverlay();

    document.getElementById('tour-x').onclick    = doSkip;
    document.getElementById('tour-skip').onclick = doSkip;
    document.getElementById('tour-back').onclick = doBack;
    document.getElementById('tour-next').onclick = doNext;

    renderStep(currentStep);

    var _t;
    function onScrollResize() {
      clearTimeout(_t);
      _t = setTimeout(function() {
        var sel = STEP_TARGETS[activeStep];
        positionSpotlight(sel ? document.querySelector(sel) : null);
      }, 100);
    }
    window.addEventListener('resize',  onScrollResize);
    window.addEventListener('scroll',  onScrollResize, { passive: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

// ── Snapshot ─────────────────────────────────────────────────────────────────
function doSnapshot() {
  const snap = JSON.parse(JSON.stringify(portfolio));
  snap.id = uuid();
  snap.isSnapshot = true;
  snap.snapshotDate = new Date().toISOString();
  snap.name = portfolio.name + ' · Snapshot ' + fmtDate(snap.snapshotDate);
  snap.sourceId = portfolio.id;
  snap.createdAt = snap.snapshotDate;
  snap.updatedAt = snap.snapshotDate;
  const latest = loadPortfolios();
  latest.push(snap);
  savePortfolios(latest);
  window.toast && window.toast.success('Snapshot saved — visible on the home page');
}

document.getElementById('snapshot-btn').onclick = () => {
  window.toast && window.toast.confirm('Save a snapshot of this portfolio?', {
    actions: [
      { label: 'Cancel', variant: '' },
      { label: 'Save Snapshot', variant: 'primary', onClick: doSnapshot }
    ]
  });
};

/* ============================================================
   TOAST NOTIFICATION SYSTEM
   ============================================================ */
(function() {
  let container = null;
  function ensureContainer() {
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    return container;
  }
  const ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    confirm: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
  };
  function escSafe(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
  function show(opts) {
    if (typeof opts === 'string') opts = { message: opts };
    const o = Object.assign({ message:'', type:'info', duration:3200, actions:null }, opts);
    const c = ensureContainer();
    const el = document.createElement('div');
    el.className = 'toast ' + o.type;
    el.innerHTML = `<div class="toast-icon">${ICONS[o.type]||ICONS.info}</div><div class="toast-msg">${escSafe(o.message)}</div>`;
    if (o.actions && o.actions.length) {
      const ad = document.createElement('div'); ad.className = 'toast-actions';
      o.actions.forEach(a => {
        const btn = document.createElement('button');
        btn.className = 'toast-btn ' + (a.variant||'');
        btn.textContent = a.label;
        btn.onclick = () => { dismiss(); if (a.onClick) a.onClick(); };
        ad.appendChild(btn);
      });
      el.querySelector('.toast-msg').appendChild(ad);
    }
    if (o.duration > 0) {
      const prog = document.createElement('div');
      prog.className = 'toast-progress';
      prog.style.animationDuration = o.duration + 'ms';
      el.appendChild(prog);
    }
    c.appendChild(el);
    let t = null;
    function dismiss() {
      clearTimeout(t);
      el.classList.add('out');
      setTimeout(() => el.remove(), 220);
    }
    if (o.duration > 0) t = setTimeout(dismiss, o.duration);
    el.onclick = dismiss;
    return { dismiss };
  }
  window.toast = {
    success: (msg, opts) => show(Object.assign({ message: msg, type: 'success' }, opts)),
    error:   (msg, opts) => show(Object.assign({ message: msg, type: 'error',   duration: 5000 }, opts)),
    info:    (msg, opts) => show(Object.assign({ message: msg, type: 'info' }, opts)),
    confirm: (msg, opts) => show(Object.assign({ message: msg, type: 'confirm', duration: 0 }, opts))
  };
})();
</script>
