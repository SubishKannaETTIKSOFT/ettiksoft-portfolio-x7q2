<style>
/* ============================================================
   TIDELAND DESIGN TOKENS
   ============================================================ */
:root {
  --base-bg:       var(--bg-page);
  --primary:       var(--brand-primary);
  --primary-dark:  #2C4A52;
  --secondary:     #B5A491;
  --anchor:        #2C4A52;
  --highlight:     #C99B6B;
  --text:          #1F2937;
  --text-muted:    #6B7280;
  --glass-bg-t:    rgba(255, 255, 252, 0.70);
  --glass-border-t:rgba(46, 74, 82, 0.10);
  --shadow-sm:     0 1px 3px rgba(44,74,82,0.08), 0 4px 12px rgba(44,74,82,0.06);
  --shadow-md:     0 2px 8px rgba(44,74,82,0.10), 0 8px 24px rgba(44,74,82,0.08);
  --shadow-lg:     0 4px 16px rgba(44,74,82,0.12), 0 16px 48px rgba(44,74,82,0.10);
  --radius-sm:     10px;
  --radius-md:     16px;
  --radius-lg:     20px;
  --radius-pill:   999px;
  --mono:          'Geist Mono', ui-monospace, monospace;
  --sans:          'Geist', -apple-system, sans-serif;
  --ease:          cubic-bezier(0.16, 1, 0.3, 1);
  --t-fast:        120ms;
  --t-base:        220ms;
  --t-slow:        380ms;

  --rag-g:    #16A34A;
  --rag-g-bg: #DCFCE7;
  --rag-a:    #D97706;
  --rag-a-bg: #FEF3C7;
  --rag-r:    #DC2626;
  --rag-r-bg: #FEE2E2;
  --trl-research: var(--secondary);
  --trl-dev:      var(--primary);
  --trl-deploy:   var(--anchor);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 15px; }
body {
  font-family: var(--sans);
  background: var(--base-bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   SCHEMATIC BACKGROUND
   ============================================================ */
.schematic-bg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.14;
  filter: blur(0.5px) saturate(0.8);
}

/* ============================================================
   DEPTH ORBS
   ============================================================ */
.depth-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  display: none; /* deck is a document page — no background orbs */
}
.depth-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(85px);
}
.depth-orb.o1 {
  width: 700px; height: 700px;
  top: -180px; left: -120px;
  background: radial-gradient(circle at 40% 40%, var(--brand-primary) 0%, transparent 70%);
  opacity: 0.22;
  animation: orbDrift1 100s ease-in-out infinite;
}
.depth-orb.o2 {
  width: 600px; height: 600px;
  bottom: -100px; right: -80px;
  background: radial-gradient(circle at 60% 60%, #B5A491 0%, transparent 70%);
  opacity: 0.20;
  animation: orbDrift2 120s ease-in-out infinite;
}
.depth-orb.o3 {
  width: 480px; height: 480px;
  top: 40%; left: 55%;
  background: radial-gradient(circle at 50% 50%, #C99B6B 0%, transparent 70%);
  opacity: 0.12;
  animation: orbDrift3 100s ease-in-out infinite;
}
@keyframes orbDrift1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(60px,-40px) scale(1.04); }
  66%      { transform: translate(-30px,50px) scale(0.97); }
}
@keyframes orbDrift2 {
  0%,100% { transform: translate(0,0) scale(1); }
  40%      { transform: translate(-50px,30px) scale(1.05); }
  70%      { transform: translate(40px,-20px) scale(0.96); }
}
@keyframes orbDrift3 {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  50%      { transform: translate(-52%,-48%) scale(1.06); }
}

/* ============================================================
   PAGE WRAPPER
   ============================================================ */
.page {
  position: relative;
  z-index: 1;
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.deck-topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 32px;
  margin: 0 -32px;
  background: rgba(250, 250, 250, 0.88);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border-bottom: 1px solid var(--glass-border-t);
}
.topbar-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  border: 1px solid var(--glass-border-t);
  background: var(--glass-bg-t);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text);
  text-decoration: none;
  transition: background var(--t-fast) var(--ease),
              border-color var(--t-fast) var(--ease),
              box-shadow var(--t-fast) var(--ease);
  white-space: nowrap;
}
.btn:hover {
  background: rgba(255,255,252,0.90);
  border-color: rgba(232,51,74,0.25);
  box-shadow: var(--shadow-sm);
}
.btn.primary {
  background: var(--brand-primary);
  color: #fff;
  border-color: transparent;
}
.btn.primary:hover {
  background: var(--brand-primary-hover);
  box-shadow: 0 4px 12px rgba(232,51,74,0.35);
}
.btn .icn { display: inline-flex; align-items: center; }

/* ============================================================
   GLASS CARD
   ============================================================ */
.card {
  background: var(--glass-bg-t);
  border: 1px solid var(--glass-border-t);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  box-shadow: var(--shadow-md);
  padding: 24px;
}

/* ============================================================
   DECK SECTIONS
   ============================================================ */
.deck-body {
  padding-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.deck-section {
  break-inside: avoid;
  page-break-inside: avoid;
}
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.10em;
  color: var(--text-muted);
  text-transform: uppercase;
  font-family: var(--mono);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--glass-border-t);
}

/* ============================================================
   SECTION 1 — HEADER
   ============================================================ */
.deck-header {
  padding: 32px 36px;
}
.deck-company {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--primary);
  font-family: var(--mono);
  margin-bottom: 10px;
}
.deck-title {
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 14px;
}
.deck-meta-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.deck-meta-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: rgba(232,51,74,0.08);
  border: 1px solid rgba(232,51,74,0.15);
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text-muted);
}
.deck-meta-chip strong { color: var(--text); font-weight: 600; }

/* ============================================================
   SECTION 2 — PORTFOLIO PULSE
   ============================================================ */
.pulse-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.pulse-card {
  background: rgba(232,51,74,0.06);
  border: 1px solid rgba(232,51,74,0.12);
  border-radius: var(--radius-md);
  padding: 20px;
  text-align: center;
}
.pulse-value {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
  font-family: var(--mono);
}
.pulse-value.v-green { color: var(--rag-g); }
.pulse-value.v-amber { color: var(--rag-a); }
.pulse-value.v-red   { color: var(--rag-r); }
.pulse-value.v-sage  { color: var(--primary); }
.pulse-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ============================================================
   SECTION 3 — STRATEGIC THESIS
   ============================================================ */
.thesis-headline {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--text);
  margin-bottom: 20px;
}
.thesis-headline .accent {
  background: var(--brand-primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.thesis-bets {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.bet-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: rgba(232,51,74,0.08);
  border: 1px solid rgba(232,51,74,0.18);
  border-radius: var(--radius-pill);
  font-size: 13px;
  color: var(--text);
}
.bet-pill .bet-verb {
  font-weight: 700;
  color: var(--primary);
}

/* ============================================================
   SECTION 4 — PRODUCT STATUS TABLE
   ============================================================ */
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.status-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.status-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: var(--mono);
  padding: 8px 12px;
  border-bottom: 1px solid var(--glass-border-t);
  white-space: nowrap;
}
.status-table td {
  padding: 12px;
  border-bottom: 1px solid rgba(46,74,82,0.06);
  color: var(--text);
  vertical-align: middle;
}
.status-table tr:last-child td { border-bottom: none; }
.status-table tr:hover td { background: rgba(232,51,74,0.04); }
.product-name-cell {
  font-weight: 600;
  white-space: nowrap;
}
.type-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-family: var(--mono);
  background: rgba(46,74,82,0.07);
  color: var(--text-muted);
}
.trl-cell {
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.trl-num {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 13px;
}
.band-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: var(--radius-pill);
  letter-spacing: 0.04em;
}
.band-research { background: rgba(181,164,145,0.20); color: #7A6A5E; }
.band-development { background: rgba(232,51,74,0.16); color: var(--primary); }
.band-deployment { background: rgba(44,74,82,0.14); color: var(--anchor); }
.band-none { background: rgba(107,114,128,0.12); color: var(--text-muted); }
.stage-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  background: rgba(232,51,74,0.12);
  color: var(--primary);
}
.biz-chip {
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  background: rgba(44,74,82,0.07);
  color: var(--text);
}
.rag-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.rag-dot.g { background: var(--rag-g); }
.rag-dot.a { background: var(--rag-a); }
.rag-dot.r { background: var(--rag-r); }
.milestone-cell {
  max-width: 220px;
  font-size: 12px;
  color: var(--text);
}
.milestone-date {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-muted);
  white-space: nowrap;
}

/* ============================================================
   SECTION 5 — COMPLIANCE SNAPSHOT
   ============================================================ */
.compliance-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.compliance-table th {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: var(--mono);
  padding: 8px 10px;
  border-bottom: 1px solid var(--glass-border-t);
  white-space: nowrap;
}
.compliance-table th.prod-col {
  text-align: left;
  min-width: 140px;
}
.compliance-table td {
  padding: 10px;
  border-bottom: 1px solid rgba(46,74,82,0.06);
  text-align: center;
  vertical-align: middle;
}
.compliance-table td.prod-name {
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
}
.compliance-table tr:last-child td { border-bottom: none; }
.comp-chip {
  display: inline-block;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.comp-certified    { background: var(--primary); color: #fff; }
.comp-aligned      { border: 1.5px solid var(--primary); color: var(--primary); }
.comp-in_progress  { border: 1.5px solid var(--highlight); color: var(--highlight); }
.comp-not_started  { border: 1.5px solid rgba(107,114,128,0.35); color: var(--text-muted); }
.comp-na           { color: var(--text-muted); font-size: 14px; letter-spacing: 0; }

/* ============================================================
   SECTION 6 — DECISIONS / SECTION 7 — RISKS
   ============================================================ */
.decisions-list, .risks-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.decision-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(232,51,74,0.05);
  border: 1px solid rgba(232,51,74,0.10);
  border-radius: var(--radius-md);
}
.decision-status {
  flex-shrink: 0;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: var(--mono);
}
.status-open   { background: rgba(217,119,6,0.12); color: var(--rag-a); }
.status-decided{ background: rgba(22,163,74,0.12); color: var(--rag-g); }
.status-deferred{ background: rgba(107,114,128,0.12); color: var(--text-muted); }
.decision-body { flex: 1; min-width: 0; }
.decision-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.decision-meta  { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.risk-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(232,51,74,0.05);
  border: 1px solid rgba(232,51,74,0.10);
  border-radius: var(--radius-md);
}
.risk-badge {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.risk-lh, .risk-imp {
  padding: 2px 6px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
}
.level-h { background: rgba(220,38,38,0.12); color: var(--rag-r); }
.level-m { background: rgba(217,119,6,0.12);  color: var(--rag-a); }
.level-l { background: rgba(22,163,74,0.12);  color: var(--rag-g); }
.level-  { background: rgba(107,114,128,0.10); color: var(--text-muted); }
.risk-body { flex: 1; min-width: 0; }
.risk-title      { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.risk-mitigation { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* ============================================================
   SECTION 8 — NEXT 90 DAYS
   ============================================================ */
.milestones-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.milestone-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 4px;
  border-bottom: 1px solid rgba(46,74,82,0.06);
}
.milestone-row:last-child { border-bottom: none; }
.ms-date-col {
  flex-shrink: 0;
  width: 96px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 1px;
}
.ms-product {
  flex-shrink: 0;
  width: 110px;
}
.ms-product-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--primary);
  font-family: var(--mono);
}
.ms-desc {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}
.ms-owner {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  padding-top: 2px;
}

/* ============================================================
   SECTION 9 — FOOTER
   ============================================================ */
.deck-foot {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.foot-left, .foot-right {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-muted);
}
.foot-center {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 64px 24px;
}
.empty-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
}
.empty-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border-radius: 12px;
  background: rgba(15,23,42,0.92);
  color: #fff !important;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.24), 0 1px 4px rgba(0,0,0,0.16);
  pointer-events: auto;
  cursor: pointer;
  max-width: 340px;
  font-size: 13px;
  font-weight: 500;
  animation: toastIn 220ms cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
  overflow: hidden;
}
.toast.out { animation: toastOut 220ms ease forwards; }
.toast-icon { flex-shrink: 0; }
.toast-msg  { flex: 1; color: #fff !important; }
@keyframes toastIn  { from { opacity:0; transform:translateY(16px) scale(0.96); } to { opacity:1; transform:none; } }

  }
  const NA = 'n/a';
  const portfolios = legacy.map(rm => {
    const sc = Object.assign({}, rm.data || {});
    delete sc.products;
    const products = (rm.data && rm.data.products || []).map(p => ({
      id: _uuid(),
      type: _inferType(p.name),
      identity: { name: p.name || '', owner: '', oneLiner: p.whyNow || '', vision: '', currentCustomers: '' },
      technologyReadiness: { trl: _inferTrl(p.stage), evidence: '', targetTrl: null, targetDate: null },
      maturity: { level: null, evidence: '' },

      businessStage: _bizStage(p.stage),
      investment: { fteCount: null, budgetTier: null, capacityNotes: p.capacity || '' },
      rag: { status: p.rag || 'G', reasoning: '' },
      nextMilestone: { description: p.nextMilestone || '', targetDate: null, owner: '' },
      compliance: { iso21434: NA, aisXXX: NA, uneceR155: NA, certIn: NA, iso27001: NA, tisax: NA, custom: [] },
      customerEvidence: [], productRisks: [], productRoadmap: [],
      createdAt: rm.createdAt || new Date().toISOString(),
      updatedAt: rm.updatedAt || new Date().toISOString(),
      lastEditedBy: 'me'
    }));
    return {
      id: rm.id, name: rm.name, isSnapshot: false, snapshotDate: null,
      createdAt: rm.createdAt || new Date().toISOString(),
      updatedAt: rm.updatedAt || new Date().toISOString(),
      lastEditedBy: 'me',
      strategicContext: sc,
      products
    };
  });
  localStorage.setItem(PF_KEY, JSON.stringify(portfolios));
}) (); } catch(e) { console.warn('Migration error:', e); }

const STORAGE_KEY = 'roadmap-builder.portfolios';

/* ============================================================
   UTILITY HELPERS
   ============================================================ */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  } catch(e) { return iso; }
}

function fmtDateShort(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
  } catch(e) { return iso; }
}

function trlBand(trl) {
  if (!trl || trl < 1) return { name: 'Not assessed', cls: 'band-none' };
  if (trl <= 3) return { name: 'Research',    cls: 'band-research' };
  if (trl <= 6) return { name: 'Development', cls: 'band-development' };
  return              { name: 'Deployment',   cls: 'band-deployment' };
}

function typeIcon(type) {
  if (type === 'hardware') return '🔩';
  if (type === 'service')  return '◌';
  return '▣';
}

function ragLabel(s) {
  if (s === 'G') return 'On Track';
  if (s === 'A') return 'At Risk';
  if (s === 'R') return 'Off Track';
  return s || '—';
}

function worstRag(products) {
  if (!products || !products.length) return 'G';
  if (products.some(p => (p.rag && p.rag.status) === 'R')) return 'R';
  if (products.some(p => (p.rag && p.rag.status) === 'A')) return 'A';
  return 'G';
}

function compChip(state) {
  if (!state || state === 'n/a') return '<span class="comp-chip comp-na">—</span>';
  const labels = { certified: 'Certified', aligned: 'Aligned', in_progress: 'In Progress', not_started: 'Not Started' };
  const label = labels[state] || state;
  return `<span class="comp-chip comp-${esc(state)}">${esc(label)}</span>`;
}

/* ============================================================

   ============================================================ */
function renderDeck(pf) {
  const sc  = pf.strategicContext || {};
  const mh  = sc.masthead  || {};
  const hero= sc.hero      || {};
  const bets= sc.bets      || [];
  const decs= sc.decisions || [];
  const risks=sc.risks     || [];
  const prods = (pf.products || []).slice().sort((a, b) => {
    const ta = (a.technologyReadiness && a.technologyReadiness.trl) || 0;
    const tb = (b.technologyReadiness && b.technologyReadiness.trl) || 0;
    return tb - ta;
  });

  const today = new Date();
  const plus90 = new Date(today.getTime() + 90 * 24 * 60 * 60 * 1000);
  const worst  = worstRag(prods);
  const trl6count = prods.filter(p => p.technologyReadiness && (p.technologyReadiness.trl || 0) >= 6).length;
  const openDecisions = decs.filter(d => (d.status || '').toLowerCase() === 'open').length;

  // Compliance framework columns
  const FRAMEWORKS = [
    { key: 'iso21434', label: 'ISO 21434' },
    { key: 'aisXXX',   label: 'AIS-189'   },
    { key: 'uneceR155',label: 'UNECE R155' },
    { key: 'certIn',   label: 'CERT-IN'   },
    { key: 'iso27001', label: 'ISO 27001'  },
    { key: 'tisax',    label: 'TISAX'     }
  ];

  // Next 90 days milestones
  let milestones = prods
    .filter(p => p.nextMilestone && p.nextMilestone.description)
    .map(p => ({
      product: p.identity ? p.identity.name : '—',
      description: p.nextMilestone.description,
      targetDate: p.nextMilestone.targetDate || null,
      owner: p.nextMilestone.owner || ''
    }));

  const withDate    = milestones.filter(m => m.targetDate && new Date(m.targetDate) <= plus90)
                                .sort((a, b) => new Date(a.targetDate) - new Date(b.targetDate));
  const noDate      = milestones.filter(m => !m.targetDate);
  const afterWindow = milestones.filter(m => m.targetDate && new Date(m.targetDate) > plus90)
                                .sort((a, b) => new Date(a.targetDate) - new Date(b.targetDate));
  const sortedMs = [...withDate, ...noDate, ...afterWindow];

  // RAG value classes
  const ragPulseClass = worst === 'G' ? 'v-green' : worst === 'A' ? 'v-amber' : 'v-red';

  // Build HTML
  let html = `<div class="deck-body">`;

  /* ── Section 1: Header ── */
  html += `
  <div class="deck-section">
    <div class="card deck-header">
      <div class="deck-company">${esc(mh.company || 'Portfolio')}</div>
      <div class="deck-title">${esc(pf.name)}</div>
      <div class="deck-meta-row">
        ${mh.date    ? `<span class="deck-meta-chip"><strong>Date</strong> ${esc(mh.date)}</span>` : ''}
        ${mh.version ? `<span class="deck-meta-chip"><strong>Ver</strong> ${esc(mh.version)}</span>` : ''}
        ${mh.tagline ? `<span class="deck-meta-chip">${esc(mh.tagline)}</span>` : ''}
      </div>
    </div>
  </div>`;

  /* ── Section 2: Portfolio Pulse ── */
  html += `
  <div class="deck-section">
    <div class="section-label">Portfolio Pulse</div>
    <div class="pulse-grid">
      <div class="pulse-card">
        <div class="pulse-value v-sage">${prods.length}</div>
        <div class="pulse-label">Products</div>
      </div>
      <div class="pulse-card">
        <div class="pulse-value v-sage">${trl6count}</div>
        <div class="pulse-label">TRL ≥ 6</div>
      </div>
      <div class="pulse-card">
        <div class="pulse-value ${openDecisions > 0 ? 'v-amber' : 'v-sage'}">${openDecisions}</div>
        <div class="pulse-label">Open Decisions</div>
      </div>
      <div class="pulse-card">
        <div class="pulse-value ${ragPulseClass}">${worst}</div>
        <div class="pulse-label">Portfolio RAG</div>
      </div>
    </div>
  </div>`;

  /* ── Section 3: Strategic Thesis ── */
  if (hero.headline || bets.length) {
    let headlineHtml = '';
    if (hero.headline) {
      const accent = hero.accentWord || '';
      headlineHtml = accent
        ? esc(hero.headline).replace(
            new RegExp(`(${esc(accent)})`, 'i'),
            '<span class="accent">$1</span>'
          )
        : esc(hero.headline);
    }
    html += `
  <div class="deck-section">
    <div class="section-label">Strategic Thesis</div>
    <div class="card" style="padding: 28px 32px;">
      ${headlineHtml ? `<div class="thesis-headline">${headlineHtml}</div>` : ''}
      ${bets.length ? `
      <div class="thesis-bets">
        ${bets.slice(0, 3).map(b => `
        <div class="bet-pill">
          <span class="bet-verb">${esc(b.verb || '')}</span>
          <span>${esc(b.headline || '')}</span>
        </div>`).join('')}
      </div>` : ''}
    </div>
  </div>`;
  }

  /* ── Section 4: Product Status Table ── */
  if (prods.length) {
    html += `
  <div class="deck-section">
    <div class="section-label">Product Status</div>
    <div class="card" style="padding: 0; overflow: hidden;">
      <div class="table-scroll">
        <table class="status-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Type</th>
              <th>TRL</th>
              <th>Stage</th>
              <th>Business Stage</th>
              <th>RAG</th>
              <th>Next Milestone</th>
              <th>Target Date</th>
            </tr>
          </thead>
          <tbody>
            ${prods.map(p => {
              const trl = p.technologyReadiness && p.technologyReadiness.trl;
              const band = trlBand(trl);
              const commStage = p.commercializationStage || '—';
              const bizStage  = p.businessStage || '—';
              const ragS      = (p.rag && p.rag.status) || 'G';
              const msDesc    = p.nextMilestone && p.nextMilestone.description || '—';
              const msDt      = p.nextMilestone && p.nextMilestone.targetDate;
              const name      = (p.identity && p.identity.name) || 'Unnamed';
              const type      = p.type || 'software';
              return `
            <tr>
              <td class="product-name-cell">${typeIcon(type)} ${esc(name)}</td>
              <td><span class="type-badge">${esc(type)}</span></td>
              <td>
                <div class="trl-cell">
                  <span class="trl-num">${trl != null ? trl : '—'}</span>
                  <span class="band-badge ${band.cls}">${band.name}</span>
                </div>
              </td>
              <td><span class="stage-chip">${commStage !== null && commStage !== undefined ? commStage : '—'}</span></td>
              <td><span class="biz-chip">${esc(bizStage)}</span></td>
              <td><span class="rag-dot ${ragS.toLowerCase()}">${esc(ragS)}</span></td>
              <td class="milestone-cell">${esc(msDesc)}</td>
              <td class="milestone-date">${fmtDateShort(msDt)}</td>
            </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
  }

  /* ── Section 5: Compliance Snapshot ── */
  if (prods.length) {
    html += `
  <div class="deck-section">
    <div class="section-label">Compliance Snapshot</div>
    <div class="card" style="padding: 0; overflow: hidden;">
      <div class="table-scroll">
        <table class="compliance-table">
          <thead>
            <tr>
              <th class="prod-col">Product</th>
              ${FRAMEWORKS.map(f => `<th>${esc(f.label)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${prods.map(p => {
              const comp = p.compliance || {};
              const name = (p.identity && p.identity.name) || 'Unnamed';
              return `
            <tr>
              <td class="prod-name">${esc(name)}</td>
              ${FRAMEWORKS.map(f => `<td>${compChip(comp[f.key])}</td>`).join('')}
            </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
  }

  /* ── Section 6: Open Decisions ── */
  const top3decs = decs.slice(0, 3);
  if (top3decs.length) {
    html += `
  <div class="deck-section">
    <div class="section-label">Open Decisions</div>
    <div class="decisions-list">
      ${top3decs.map(d => {
        const statusRaw = (d.status || '').toLowerCase();
        const statusCls = statusRaw === 'open' ? 'status-open' : statusRaw === 'decided' ? 'status-decided' : 'status-deferred';
        return `
      <div class="decision-row">
        <span class="decision-status ${statusCls}">${esc(d.status || '—')}</span>
        <div class="decision-body">
          <div class="decision-title">${esc(d.decision || d.title || '—')}</div>
          <div class="decision-meta">${d.owner ? `Owner: ${esc(d.owner)}` : ''}${d.owner && (d.due || d.deadline) ? ' · ' : ''}${(d.due || d.deadline) ? `Due: ${esc(d.due || d.deadline)}` : ''}</div>
        </div>
      </div>`;
      }).join('')}
    </div>
  </div>`;
  }

  /* ── Section 7: Top Risks ── */
  const top3risks = risks.slice(0, 3);
  if (top3risks.length) {
    html += `
  <div class="deck-section">
    <div class="section-label">Top Risks</div>
    <div class="risks-list">
      ${top3risks.map(r => {
        const lh  = (r.likelihood || '').charAt(0).toUpperCase();
        const imp = (r.impact     || '').charAt(0).toUpperCase();
        return `
      <div class="risk-row">
        <div class="risk-badge">
          <span class="risk-lh  level-${lh}">L:${lh}</span>
          <span class="risk-imp level-${imp}">I:${imp}</span>
        </div>
        <div class="risk-body">
          <div class="risk-title">${esc(r.risk || r.title || '—')}</div>
          ${r.mitigation ? `<div class="risk-mitigation">${esc(r.mitigation)}</div>` : ''}
        </div>
      </div>`;
      }).join('')}
    </div>
  </div>`;
  }

  /* ── Section 8: Next 90 Days ── */
  if (sortedMs.length) {
    html += `
  <div class="deck-section">
    <div class="section-label">Next 90 Days</div>
    <div class="card" style="padding: 8px 24px;">
      <div class="milestones-list">
        ${sortedMs.map(m => `
        <div class="milestone-row">
          <div class="ms-date-col">${m.targetDate ? fmtDateShort(m.targetDate) : '<span style="color:var(--text-muted);font-style:italic;font-size:11px">no date</span>'}</div>
          <div class="ms-product"><span class="ms-product-name">${esc(m.product)}</span></div>
          <div class="ms-desc">${esc(m.description)}</div>
          ${m.owner ? `<div class="ms-owner">${esc(m.owner)}</div>` : ''}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
  }

  /* ── Section 9: Footer ── */
  html += `
  <div class="deck-section">
    <div class="card deck-foot">
      <div class="foot-left">Generated ${fmtDate(new Date().toISOString())}</div>
      <div class="foot-center">Roadmap Builder · Confidential</div>
      <div class="foot-right">${mh.version ? `v${esc(mh.version)}` : ''}</div>
    </div>
    <div class="sec-footer-notice" style="justify-content:center;margin-top:10px;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="13" height="13" style="flex-shrink:0;opacity:0.7"><path d="M8 1.5L2 4v4c0 3.534 2.507 6.837 6 7.6C11.493 14.837 14 11.534 14 8V4L8 1.5z"/></svg>ETTIKSOFT internal &nbsp;·&nbsp; Data stays in your browser &nbsp;·&nbsp; No customer-confidential information</div>
  </div>`;

  html += `</div>`; // .deck-body

  document.getElementById('deck-content').innerHTML = html;
}

function downloadHTML() {
  if (!portfolio) return;
  const docClone = document.documentElement.cloneNode(true);
  docClone.querySelectorAll('.deck-topbar').forEach(el => el.remove());
  docClone.querySelectorAll('script').forEach(el => el.remove());
  const titleEl = docClone.querySelector('title');
  if (titleEl) titleEl.textContent = portfolio.name + ' · Board Deck';
  const html = '<!DOCTYPE html>\n' + docClone.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const safe = (portfolio.name || 'deck').replace(/[^a-z0-9_\-]+/gi, '_').replace(/^_+|_+$/g, '') || 'deck';
  a.href = url;
  a.download = `${safe}-deck.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

        'margin-bottom:16px;font-family:-apple-system,system-ui,sans-serif;}' +
      '.tour-actions{display:flex;align-items:center;gap:6px;}' +
      '.tour-spacer{flex:1;}' +
      '.tour-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;' +
        'font-size:12px;font-weight:600;font-family:-apple-system,system-ui,sans-serif;' +
        'cursor:pointer;pointer-events:auto;border:1px solid rgba(46,74,82,0.15);' +
        'transition:all 120ms ease;white-space:nowrap;}' +
      '.tour-btn.t-ghost{background:transparent;color:#6B7280;}' +
      '.tour-btn.t-ghost:hover{background:rgba(232,51,74,0.08);color:#1F2937;}' +
      '.tour-btn.t-primary{background:linear-gradient(135deg,var(--brand-primary) 0%,#2C4A52 100%);' +
        'color:#fff;border-color:transparent;}' +
      '.tour-btn.t-primary:hover{opacity:0.88;}' +
      '.tour-btn:disabled{opacity:0.38;cursor:not-allowed;pointer-events:none;}' +
      '#tour-retrigger-btn{display:inline-flex;align-items:center;justify-content:center;' +
        'width:26px;height:26px;border-radius:50%;border:1px solid rgba(46,74,82,0.18);' +
        'background:rgba(255,255,252,0.70);backdrop-filter:blur(8px);' +
        'font-size:12px;font-weight:700;color:#6B7280;cursor:pointer;' +
        'font-family:ui-monospace,monospace;transition:all 120ms ease;flex-shrink:0;line-height:1;}' +
      '#tour-retrigger-btn:hover{background:rgba(232,51,74,0.12);color:var(--brand-primary);' +
        'border-color:rgba(232,51,74,0.30);}';
    document.head.appendChild(s);
  }

  // ── Overlay DOM ───────────────────────────────────────────────────────
  function buildOverlay() {
    if (document.getElementById('tour-overlay')) return;
    var ov = document.createElement('div');
    ov.id = 'tour-overlay';
    ov.innerHTML =
      '<div id="tour-spotlight"></div>' +
      '<div id="tour-tooltip">' +
        '<div class="tour-step-row">' +
          '<span class="tour-step-badge" id="tour-step-badge">1 of ' + TOTAL + '</span>' +
          '<button class="tour-x-btn" id="tour-x" title="Skip tour">×</button>' +
        '</div>' +
        '<div class="tour-edge-msg" id="tour-edge-msg" style="display:none"></div>' +
        '<div class="tour-text" id="tour-text"></div>' +
        '<div class="tour-actions">' +
          '<button class="tour-btn t-ghost" id="tour-back">← Back</button>' +
          '<span class="tour-spacer"></span>' +
          '<button class="tour-btn t-ghost" id="tour-skip">Skip tour</button>' +
          '<button class="tour-btn t-primary" id="tour-next">Next →</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);
  }

  // ── Spotlight + tooltip positioning ──────────────────────────────────
  function positionSpotlight(el) {
    var spot = document.getElementById('tour-spotlight');
    var tip  = document.getElementById('tour-tooltip');
    if (!spot || !tip) return;
    if (!el) {
      spot.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;' +
        'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);border-radius:10px;';
      tip.style.top = ''; tip.style.bottom = '32px';
      tip.style.left = '50%';
      tip.style.transform = 'translateX(-50%)';
      return;
    }
    tip.style.transform = '';
    var pad = 8;
    var r   = el.getBoundingClientRect();
    spot.style.cssText =
      'position:fixed;' +
      'top:'    + (r.top    - pad) + 'px;' +
      'left:'   + (r.left   - pad) + 'px;' +
      'width:'  + (r.width  + pad * 2) + 'px;' +
      'height:' + (r.height + pad * 2) + 'px;' +
      'border-radius:10px;' +
      'box-shadow:0 0 0 9999px rgba(15,23,42,0.70);' +
      'outline:2px solid rgba(255,255,255,0.55);';
    // Fixed bottom centre — spotlight tracks element, tooltip stays put
    tip.style.top = ''; tip.style.bottom = '32px';
    tip.style.left = '50%';
    tip.style.transform = 'translateX(-50%)';
  }

  // ── Step rendering ────────────────────────────────────────────────────
  var activeStep = currentStep;

  function renderStep(step) {
    activeStep = step;
    var badge   = document.getElementById('tour-step-badge');
    var textEl  = document.getElementById('tour-text');
    var edgeEl  = document.getElementById('tour-edge-msg');
    var backBtn = document.getElementById('tour-back');
    var nextBtn = document.getElementById('tour-next');
    if (badge)   badge.textContent  = step + ' of ' + TOTAL;
    if (textEl)  textEl.textContent = STEPS[step] || '';
    if (edgeEl)  edgeEl.style.display = 'none';
    if (backBtn) backBtn.disabled   = (step === 1);
    if (nextBtn) { nextBtn.textContent = (step === TOTAL) ? 'Finish ✓' : 'Next →'; nextBtn.disabled = false; }

    // Edge case: step 1 and no portfolio
    if (step === 1 && edgeEl) {
      if (!firstActivePortfolio()) {
        edgeEl.textContent = 'Create your portfolio first using the button below. The tour will continue automatically when you land on the dashboard.';
        edgeEl.style.display = 'block';
        if (nextBtn) nextBtn.disabled = true;
      }
    }
    var sel = STEP_TARGETS[step];
    var el  = sel ? document.querySelector(sel) : null;
    setTimeout(function() { positionSpotlight(el); }, 60);
  }

  // ── Navigation ────────────────────────────────────────────────────────
  function navTo(step) {
    var pf = firstActivePortfolio();
    var pr = pf ? firstProduct(pf) : null;

    // Same-page transitions (product.html steps 3 <-> 4)
    var onProductPage = (PAGE_STEPS.indexOf(3) !== -1 || PAGE_STEPS.indexOf(4) !== -1);
    if (onProductPage && (step === 3 || step === 4)) {
      setStep(step);
      var targetId = (step === 3) ? 's2' : 's7';
      var targetEl = document.getElementById(targetId);
      if (targetEl) {
        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(function() { renderStep(step); }, 350);
      } else {
        renderStep(step);
      }
      return;
    }

    setStep(step);
    switch (step) {
      case 1: window.location.href = 'index.html'; break;
      case 2: if (pf) { window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id); } break;
      case 3:
        if (pf && pr) {
          window.location.href = 'product.html?portfolio=' + encodeURIComponent(pf.id) + '&product=' + encodeURIComponent(pr.id);
        } else {
          // No products yet: skip to step 5
          setStep(5);
          if (pf) window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id);
        }
        break;
      case 5: if (pf) { window.location.href = 'dashboard.html?id=' + encodeURIComponent(pf.id); } break;
      case 6: if (pf) { window.location.href = 'heatmap.html?id='   + encodeURIComponent(pf.id); } break;
      case 7: if (pf) { window.location.href = 'deck.html?id='      + encodeURIComponent(pf.id); } break;
    }
  }

  function doNext() {
    var step = activeStep;
    if (step === TOTAL) { markSeen(); var ov = document.getElementById('tour-overlay'); if (ov) ov.remove(); return; }
    if (step === 1 && !firstActivePortfolio()) return; // edge: no portfolio
    if (step === 3) { navTo(4); return; }
    if (step === 4) { navTo(5); return; }
    navTo(step + 1);
  }

  function doBack() {
    var step = activeStep;
    if (step <= 1) return;
    if (step === 4) { navTo(3); return; }
    navTo(step - 1);
  }

  function doSkip() {
    markSeen();
    var ov = document.getElementById('tour-overlay');
    if (ov) ov.remove();
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  function init() {
    wireRetrigger();
    injectStyles();
    buildOverlay();

    document.getElementById('tour-x').onclick    = doSkip;
    document.getElementById('tour-skip').onclick = doSkip;
    document.getElementById('tour-back').onclick = doBack;
    document.getElementById('tour-next').onclick = doNext;

    renderStep(currentStep);

    var _t;
    function onScrollResize() {
      clearTimeout(_t);
      _t = setTimeout(function() {
        var sel = STEP_TARGETS[activeStep];
        positionSpotlight(sel ? document.querySelector(sel) : null);
      }, 100);
    }
    window.addEventListener('resize',  onScrollResize);
    window.addEventListener('scroll',  onScrollResize, { passive: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

document.getElementById('download-btn').onclick = downloadHTML;
document.getElementById('print-btn').onclick = () => window.print();

/* ============================================================
   TOAST NOTIFICATION SYSTEM
   ============================================================ */
(function() {
  let container = null;
  function ensureContainer() {
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    return container;
  }
  const ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  function escSafe(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
  function show(opts) {
    if (typeof opts === 'string') opts = { message: opts };
    const o = Object.assign({ message:'', type:'info', duration:3200 }, opts);
    const c = ensureContainer();
    const el = document.createElement('div');
    el.className = 'toast ' + o.type;
    el.innerHTML = `<div class="toast-icon">${ICONS[o.type]||ICONS.info}</div><div class="toast-msg">${escSafe(o.message)}</div>`;
    c.appendChild(el);
    let t = null;
    function dismiss() { clearTimeout(t); el.classList.add('out'); setTimeout(() => el.remove(), 220); }
    if (o.duration > 0) t = setTimeout(dismiss, o.duration);
    el.onclick = dismiss;
  }
  window.toast = {
    success: (msg, opts) => show(Object.assign({ message: msg, type: 'success' }, opts)),
    error:   (msg, opts) => show(Object.assign({ message: msg, type: 'error', duration: 5000 }, opts)),
    info:    (msg, opts) => show(Object.assign({ message: msg, type: 'info' }, opts))
  };
})();
</script>
<script>
/* Phase 1B — active tab highlighting */
(function(){
  var path = window.location.pathname.toLowerCase().split('/').pop() || 'index.html';
  var tab = 'overview';
  if(path === 'product.html') tab = 'products';
  else if(path === 'deck.html') tab = 'deck';
  var hdr = document.getElementById('app-header');
  if(!hdr) return;
  var links = hdr.querySelectorAll('[data-tab]');
  links.forEach(function(a){
    if(a.getAttribute('data-tab') === tab){
      a.style.color = 'var(--fg-primary)';
      a.style.borderBottom = '2px solid var(--brand-primary)';
      a.style.fontWeight = '600';
      a.setAttribute('data-active', '1');
    }
  });
})();
</script>
<script>
/* Phase 1B — header utility stubs */
if(typeof exportData==='undefined'){window.exportData=function(){
  var d=localStorage.getItem('roadmap-builder.portfolios');
  if(!d){alert('No portfolio data to export.');return;}
  var blob=new Blob([d],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ettiksoft-portfolio-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};}
if(typeof importData==='undefined'){window.importData=function(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();r.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(!Array.isArray(d))throw new Error('Expected array of portfolios');
        localStorage.setItem('roadmap-builder.portfolios',ev.target.result);
        location.reload();
      }catch(err){alert('Import failed: '+err.message);}
    };r.readAsText(f);
  };inp.click();
};}
if(typeof toggleHelp==='undefined'){window.toggleHelp=function(){
  window.open('GETTING_STARTED.html','_blank');
};}
</script>
